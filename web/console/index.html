<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meshproxy 控制台</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--panel); border-right: 1px solid var(--border); padding: 1rem 0; flex-shrink: 0; position: relative; transition: width 0.2s ease, border 0.2s ease; }
    .sidebar h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); padding: 0 1rem; margin: 0 0 0.5rem; }
    .sidebar-tools { display: flex; align-items: center; gap: 0.5rem; padding: 0 1rem 0.75rem; }
    .sidebar-tools label { font-size: 0.8rem; color: var(--muted); }
    .sidebar-tools select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.4rem; }
    .sidebar a { display: block; padding: 0.5rem 1rem; color: var(--text); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
    .sidebar a:hover { background: rgba(255,255,255,0.05); }
    .sidebar a.active { border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
    .sidebar .nav-label {}
    .collapse-toggle {
      position: absolute;
      top: 0.6rem;
      right: 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      padding: 0.25rem 0.55rem;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      transition: background 0.15s ease;
    }
    .collapse-toggle:hover { background: rgba(255,255,255,0.04); }
    .sidebar.collapsed { width: 64px; border-right-color: rgba(255,255,255,0.08); }
    .sidebar.collapsed .sidebar-title { display: none; }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar.collapsed a { padding: 0.4rem 0; text-align: center; border-left: none; }
    .sidebar.collapsed .collapse-toggle { right: 0.35rem; }
    .main { flex: 1; padding: 1.5rem; overflow: auto; }
    .main h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .card h3 { font-size: 0.95rem; margin: 0 0 0.75rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: 0; }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 0.25rem 1rem; font-size: 0.875rem; }
    .kv dt { color: var(--muted); margin: 0; }
    .kv dd { margin: 0; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .badge.ok { background: rgba(63,185,80,0.2); color: var(--ok); }
    .badge.warn { background: rgba(210,153,34,0.2); color: var(--warn); }
    .badge.err { background: rgba(248,81,73,0.2); color: var(--err); }
    .log-line { font-family: ui-monospace, monospace; font-size: 0.8rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    .log-line .ts { color: var(--muted); margin-right: 0.5rem; }
    .log-line .cat { color: var(--accent); margin-right: 0.5rem; }
    .empty { color: var(--muted); font-style: italic; }
    .refresh { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .path-hop { display: inline-block; margin-right: 0.25rem; padding: 0.1rem 0.4rem; background: var(--border); border-radius: 4px; font-size: 0.8rem; }
    .form-row { margin-bottom: 0.75rem; }
    .form-row label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.25rem; }
    .form-row select, .form-row input[type=text] { width: 100%; max-width: 280px; padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .form-row .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .tag-input { display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; padding: 0.4rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; min-height: 38px; }
    .tag-input input { flex: 1; min-width: 60px; background: none; border: none; color: var(--text); padding: 0.2rem; font-size: 0.9rem; }
    .tag-input input:focus { outline: none; }
    .tag { display: inline-flex; align-items: center; padding: 0.15rem 0.4rem; background: var(--border); border-radius: 4px; font-size: 0.8rem; }
    .tag .rm { cursor: pointer; margin-left: 0.35rem; color: var(--muted); }
    .tag .rm:hover { color: var(--err); }
    .btn { padding: 0.4rem 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.875rem; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: #79b8ff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .update-settings {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .update-settings label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.88rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .update-settings input[type=checkbox] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .update-settings .hint {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .update-note { white-space: pre-wrap; font-size: 0.82rem; color: var(--muted); margin-top: 0.6rem; }
    .exit-candidates { margin-top: 1rem; }
    .exit-candidates table { font-size: 0.8rem; }
    .msg { padding: 0.5rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .msg.ok { background: rgba(63,185,80,0.15); color: var(--ok); }
    .msg.err { background: rgba(248,81,73,0.15); color: var(--err); }
    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.3rem;
        padding: 0.5rem 0.75rem;
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--panel);
      }
      .sidebar h2 { display: none; }
      .sidebar a {
        flex: 1 1 120px;
        border-left: none;
        border-radius: 6px;
        text-align: center;
        font-size: 0.8rem;
        padding: 0.4rem 0.5rem;
      }
      .main { padding: 1rem; }
    }
    @media (max-width: 640px) {
      .sidebar {
        justify-content: flex-start;
        overflow-x: auto;
      }
      .sidebar a {
        flex: 0 0 auto;
        min-width: 120px;
        white-space: nowrap;
      }
      .card {
        padding: 0.9rem;
      }
      .kv {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.25rem 0.85rem;
      }
      .card table {
        font-size: 0.78rem;
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      .main {
        padding-top: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <button class="collapse-toggle" type="button" aria-label="折叠菜单" aria-pressed="false">☰</button>
      <h2 class="sidebar-title" data-i18n="console_title">控制台</h2>
      <div class="sidebar-tools">
        <label for="lang-select" data-i18n="language">语言</label>
        <select id="lang-select">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <a href="#status" data-page="status" class="active"><span class="nav-label" data-i18n="nav_status">节点状态</span></a>
      <a href="#relays" data-page="relays"><span class="nav-label" data-i18n="nav_relays">Relay / Exit</span></a>
      <a href="#circuits" data-page="circuits"><span class="nav-label" data-i18n="nav_circuits">Circuit 列表</span></a>
      <a href="#streams" data-page="streams"><span class="nav-label" data-i18n="nav_streams">Stream 列表</span></a>
      <a href="#circuit-pool" data-page="circuit-pool"><span class="nav-label" data-i18n="nav_pool">电路池</span></a>
      <a href="#traffic" data-page="traffic"><span class="nav-label" data-i18n="nav_traffic">实时流量</span></a>
      <a href="#routing" data-page="routing"><span class="nav-label" data-i18n="nav_routing">路由规则</span></a>
      <a href="#exit-policy" data-page="exit-policy"><span class="nav-label" data-i18n="nav_exit">出口选择</span></a>
      <a href="#exit-operator-policy" data-page="exit-operator-policy"><span class="nav-label" data-i18n="nav_exit_operator">出口政策</span></a>
      <a href="#logs" data-page="logs"><span class="nav-label" data-i18n="nav_logs">日志面板</span></a>
    </nav>
    <main class="main">
      <div id="content"></div>
    </main>
  </div>
  <script>
    const API = '';
    const LOCALE_KEY = 'meshproxy-console-locale';
    const STATIC_I18N = {

        console_title: '控制台',
        language: '语言',
        nav_status: '节点状态',
        nav_relays: 'Relay / Exit',
        nav_circuits: 'Circuit 列表',
        nav_streams: 'Stream 列表',
        nav_pool: '电路池',
        nav_traffic: '实时流量',
        nav_routing: '路由规则',
        nav_exit: '出口选择',
        nav_exit_operator: '出口政策',
        nav_logs: '日志面板',
        loading: '加载中…',
        load_failed: '加载失败: '
      },
      en: {
        console_title: 'Console',
        language: 'Language',
        nav_status: 'Node Status',
        nav_relays: 'Relay / Exit',
        nav_circuits: 'Circuits',
        nav_streams: 'Streams',
        nav_pool: 'Circuit Pool',
        nav_traffic: 'Traffic',
        nav_routing: 'Routing',
        nav_exit: 'Exit Selection',
        nav_exit_operator: 'Exit Policy',
        nav_logs: 'Logs',
        loading: 'Loading…',
        load_failed: 'Load failed: '
      }
    };
    const EN_REPLACEMENTS = {
      '控制台': 'Console',
      '节点状态': 'Node Status',
      '基本信息': 'Basic Info',
      '模式': 'Mode',
      '运行时长': 'Uptime',
      '已知 Relay': 'Known Relays',
      '已知 Exit': 'Known Exits',
      'P2P 监听': 'P2P Listen',
      '电路池': 'Circuit Pool',
      '尚无节点': 'No nodes yet',
      '版本': 'Version',
      '角色': 'Role',
      '国家/地区': 'Country/Region',
      'Circuit 列表': 'Circuits',
      '目前无电路': 'No circuits',
      '状态': 'State',
      '心跳': 'Heartbeat',
      '路径': 'Path',
      '发送': 'Sent',
      '接收': 'Received',
      '建立时间': 'Created At',
      'Stream 列表': 'Streams',
      '目前无 stream': 'No streams',
      '目标': 'Target',
      '实时流量': 'Traffic',
      '无法取得指标': 'Unable to load metrics',
      '汇总': 'Summary',
      '电路总数': 'Circuits',
      '活跃 Stream': 'Active Streams',
      '最近错误数': 'Recent Errors',
      '路由规则': 'Routing',
      '路由规则界面尚未开放，请通过配置文件或 API 设置。': 'Routing UI is not available yet. Please use the config file or API.',
      '总量控制': 'Total Limits',
      '最小总数': 'Min Total',
      '最大总数': 'Max Total',
      '默认只维持 1 条 circuit。保存后会立即更新运行中的池子，并写回配置文件。': 'By default only 1 circuit is kept. Saving applies to the running pool and persists to config.',
      '每池最小 / 最大（只读）': 'Per-pool Min / Max (read-only)',
      '保存设置': 'Save',
      '请输入正整数。': 'Please enter positive integers.',
      '保存失败: ': 'Save failed: ',
      '已保存电路池设置。': 'Circuit pool settings saved.',
      '出口节点管理': 'Exit Selection',
      '出口选择': 'Exit Selection',
      '自动选择': 'Auto',
      '仅使用指定国家/地区': 'Only selected countries/regions',
      '优先使用指定国家/地区': 'Prefer selected countries/regions',
      '固定指定出口节点': 'Fixed exit peer',
      '固定出口 Peer ID（fixed_peer 时必填）': 'Fixed Exit Peer ID (required for fixed_peer)',
      '排除指定国家/地区': 'Excluded countries/regions',
      '找不到符合条件时允许退回任意出口': 'Fallback to any exit when no match',
      '允许直连出口（Local → Exit）': 'Allow direct exit (Local → Exit)',
      '本地 SOCKS5 原样转发到 Exit 的 SOCKS5': 'Tunnel local SOCKS5 to exit SOCKS5',
      '仅选支持 Remote DNS 的出口': 'Require Remote DNS support',
      '仅选支持 TCP 的出口': 'Require TCP support',
      '当前可选出口': 'Available exits',
      '暂无符合当前规则的出口节点，或尚未发现任何 Exit。': 'No exits match the current rules, or no exits have been discovered yet.',
      '已保存出口选择设置。': 'Exit selection saved.',
      '自动更新': 'Auto Update',
      '正在读取自动更新设置…': 'Loading auto-update settings…',
      '开启后会定期检查 GitHub，并在发现新版本后自动下载安装。': 'When enabled, it periodically checks GitHub and automatically downloads and installs new releases.',
      '关闭后只保留手动检查与手动更新。': 'When disabled, only manual check and manual update remain.',
      '自动更新设置不可用': 'Auto-update settings unavailable',
      '保存自动更新设置失败: ': 'Failed to save auto-update settings: ',
      '出口政策': 'Exit Policy',
      '运行状态': 'Runtime Status',
      '维护模式 (drain)': 'Drain Mode',
      '接受新连接': 'Accept New Streams',
      '当前出口连接数': 'Open Exit Connections',
      '进入维护模式': 'Enter Drain Mode',
      '结束维护模式': 'Leave Drain Mode',
      '策略配置': 'Policy',
      '允许 TCP': 'Allow TCP',
      '允许 UDP': 'Allow UDP',
      '出口端解析 DNS (Remote DNS)': 'Resolve DNS on exit (Remote DNS)',
      '允许的端口（空则仅受拒绝列表限制）': 'Allowed ports (empty means only denied list applies)',
      '拒绝的端口': 'Denied ports',
      '允许的域名（精确）': 'Allowed domains (exact)',
      '允许的域名后缀（如 .google.com）': 'Allowed domain suffixes (e.g. .google.com)',
      '拒绝的域名（精确）': 'Denied domains (exact)',
      '拒绝的域名后缀': 'Denied domain suffixes',
      'Peer 白名单（空则不做白名单限制）': 'Peer whitelist (empty = disabled)',
      'Peer 黑名单': 'Peer blacklist',
      '允许访问私网目标 IP': 'Allow private IP targets',
      '允许回环目标': 'Allow loopback targets',
      '允许链路本地目标': 'Allow link-local targets',
      '保存策略': 'Save Policy',
      '最近拒绝记录': 'Recent Rejects',
      '时间': 'Time',
      '原因': 'Reason',
      '策略已保存并已写回配置文件。': 'Policy saved and written back to the config file.',
      '已进入维护模式，配置已写回文件。': 'Drain mode enabled and saved to config.',
      '已结束维护模式，配置已写回文件。': 'Drain mode disabled and saved to config.',
      '操作失败: ': 'Operation failed: ',
      '日志面板': 'Logs',
      '尚无最近错误记录': 'No recent errors',
      '最近错误': 'Recent Errors',
      '加载失败: ': 'Load failed: ',
      '加载中…': 'Loading…',
      '正常': 'Healthy',
      '失联': 'Offline',
      '心跳状态': 'Heartbeat status',
      '是': 'Yes',
      '否': 'No'
    };
    let currentLocale = readLocale();
    function readLocale() {
      try { return localStorage.getItem(LOCALE_KEY) || 'zh'; } catch (e) { return 'zh'; }
    }
    function writeLocale(value) {
      try { localStorage.setItem(LOCALE_KEY, value); } catch (e) {}
    }
    function ts(key) {
      return (STATIC_I18N[currentLocale] && STATIC_I18N[currentLocale][key]) || STATIC_I18N.zh[key] || key;
    }
    function translateHtml(html) {
      if (currentLocale !== 'en') return html;
      var out = html;
      Object.keys(EN_REPLACEMENTS).sort(function(a, b){ return b.length - a.length; }).forEach(function(from) {
        out = out.split(from).join(EN_REPLACEMENTS[from]);
      });
      return out;
    }
    function applyStaticI18n() {
      document.documentElement.lang = currentLocale === 'en' ? 'en' : 'zh-CN';
      document.title = 'meshproxy ' + ts('console_title');
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        el.textContent = ts(el.dataset.i18n);
      });
      var langSelect = document.getElementById('lang-select');
      if (langSelect) langSelect.value = currentLocale;
    }
    function api(path) { return (API || '') + path; }
    function get(path) { return fetch(api(path)).then(r => r.ok ? r.json() : Promise.reject(new Error(r.statusText))); }
    function post(path, body) {
      return fetch(api(path), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined }).then(function(r) {
        return r.text().then(function(text) {
          var data = null;
          if (text) {
            try { data = JSON.parse(text); } catch (e) {}
          }
          if (!r.ok) throw new Error((data && (data.error || data.message)) || text || r.statusText);
          return data;
        });
      });
    }

    var lastUpdateInfo = null;
    var lastAutoUpdateEnabled = null;

    function renderUpdateInfo(info, applying) {
      if (!info) return '<p class="empty">点击按钮后会从 GitHub 检查最新 release。</p>';
      var state = info.update_available
        ? (info.asset_available ? '<span class="badge warn">发现新版本</span>' : '<span class="badge err">有新版本但当前平台无安装包</span>')
        : '<span class="badge ok">已是最新</span>';
      var html = '<dl class="kv">' +
        '<dt>当前版本</dt><dd>' + escapeHtml(info.current_version || 'devel') + '</dd>' +
        '<dt>最新版本</dt><dd>' + escapeHtml(info.latest_version || '-') + ' ' + state + '</dd>' +
        '<dt>发布时间</dt><dd>' + escapeHtml(info.published_at ? new Date(info.published_at).toLocaleString() : '-') + '</dd>' +
        '<dt>平台</dt><dd>' + escapeHtml((info.os || '-') + '/' + (info.arch || '-')) + '</dd>' +
        '<dt>安装包</dt><dd>' + escapeHtml(info.asset_name || '-') + '</dd>' +
        '</dl>';
      if (info.release_url) {
        html += '<div class="form-row"><a href="' + escapeHtml(info.release_url) + '" target="_blank" rel="noopener noreferrer">打开 GitHub Release</a></div>';
      }
      if (info.notes) {
        html += '<div class="update-note">' + escapeHtml(info.notes) + '</div>';
      }
      if (applying) {
        html = '<div class="msg ok">更新包已下载，节点即将重启到新版本。</div>' + html;
      }
      return html;
    }

    function renderAutoUpdateSettings(enabled) {
      if (enabled === null || enabled === undefined) {
        return '<div class="update-settings" id="update-settings"><label><input type="checkbox" id="auto-update-toggle" disabled> 自动更新</label><span class="hint">正在读取自动更新设置…</span></div>';
      }
      return '<div class="update-settings" id="update-settings">' +
        '<label><input type="checkbox" id="auto-update-toggle"' + (enabled ? ' checked' : '') + '> 自动更新</label>' +
        '<span class="hint">' + escapeHtml(enabled ? '开启后会定期检查 GitHub，并在发现新版本后自动下载安装。' : '关闭后只保留手动检查与手动更新。') + '</span>' +
        '</div>';
    }

    function refreshAutoUpdateSettings() {
      return get('/api/v1/update/settings').then(function(info) {
        lastAutoUpdateEnabled = !!(info && info.auto_update);
        var box = document.getElementById('update-settings');
        if (!box) return info;
        box.outerHTML = renderAutoUpdateSettings(lastAutoUpdateEnabled);
        bindAutoUpdateToggle();
        return info;
      }).catch(function() {
        var box = document.getElementById('update-settings');
        if (box) {
          box.outerHTML = '<div class="update-settings" id="update-settings"><label><input type="checkbox" id="auto-update-toggle" disabled> 自动更新</label><span class="hint">自动更新设置不可用</span></div>';
        }
      });
    }

    function bindAutoUpdateToggle() {
      var toggle = document.getElementById('auto-update-toggle');
      if (!toggle) return;
      toggle.onchange = function() {
        var enabled = !!toggle.checked;
        toggle.disabled = true;
        post('/api/v1/update/settings', { auto_update: enabled }).then(function(info) {
          lastAutoUpdateEnabled = !!(info && info.auto_update);
          var box = document.getElementById('update-settings');
          if (box) {
            box.outerHTML = renderAutoUpdateSettings(lastAutoUpdateEnabled);
            bindAutoUpdateToggle();
          }
        }).catch(function(err) {
          alert('保存自动更新设置失败: ' + err.message);
          var box = document.getElementById('update-settings');
          if (box) {
            box.outerHTML = renderAutoUpdateSettings(lastAutoUpdateEnabled);
            bindAutoUpdateToggle();
          }
        });
      };
    }

    function bindUpdateControls() {
      var checkBtn = document.getElementById('check-update-btn');
      var applyBtn = document.getElementById('apply-update-btn');
      var box = document.getElementById('update-result');
      if (!checkBtn || !applyBtn || !box) return;
      applyBtn.disabled = !(lastUpdateInfo && lastUpdateInfo.update_available && lastUpdateInfo.asset_available);
      checkBtn.onclick = function() {
        checkBtn.disabled = true;
        applyBtn.disabled = true;
        box.innerHTML = '<div class="msg ok">正在检查 GitHub 最新版本…</div>';
        post('/api/v1/update/check').then(function(info) {
          lastUpdateInfo = info;
          box.innerHTML = renderUpdateInfo(info, false);
          applyBtn.disabled = !(info.update_available && info.asset_available);
        }).catch(function(err) {
          box.innerHTML = '<div class="msg err">检查更新失败: ' + escapeHtml(err.message) + '</div>';
        }).finally(function() {
          checkBtn.disabled = false;
        });
      };
      applyBtn.onclick = function() {
        if (!lastUpdateInfo || !lastUpdateInfo.update_available || !lastUpdateInfo.asset_available) return;
        if (!window.confirm('确认下载并更新到 ' + (lastUpdateInfo.latest_version || '最新版本') + ' 吗？程序会自动重启。')) return;
        checkBtn.disabled = true;
        applyBtn.disabled = true;
        box.innerHTML = '<div class="msg ok">正在下载更新包并准备替换当前程序…</div>';
        post('/api/v1/update/apply').then(function(info) {
          lastUpdateInfo = info;
          box.innerHTML = renderUpdateInfo(info, true);
          setTimeout(function() { location.reload(); }, 12000);
        }).catch(function(err) {
          box.innerHTML = '<div class="msg err">应用更新失败: ' + escapeHtml(err.message) + '</div>';
          checkBtn.disabled = false;
          applyBtn.disabled = !(lastUpdateInfo && lastUpdateInfo.update_available && lastUpdateInfo.asset_available);
        });
      };
    }

    function renderRouting() { return '<h1>路由规则</h1><div class="card"><p class="empty">路由规则界面尚未开放，请通过配置文件或 API 设置。</p></div>'; }
    function renderCircuitPoolConfig() {

    function renderExitPolicy() {
      return Promise.all([
        get('/api/v1/client/exit-selection').catch(function(){ return {}; }),
        get('/api/v1/client/exit-candidates').catch(function(){ return { candidates: [] }; })
      ]).then(function(res) {
        var cfg = res[0] || {};
        var cand = res[1];
        var candidates = (cand && Array.isArray(cand.candidates)) ? cand.candidates : [];
        var allowed = (cfg.allowed_countries || []).slice();
        var preferred = (cfg.preferred_countries || []).slice();
        var excluded = (cfg.exclude_countries || []).slice();
        var mode = cfg.mode || 'auto';
        var fallback = cfg.fallback_to_any !== false;
        var allowDirect = cfg.allow_direct_exit !== false;
        var requireDNS = !!cfg.require_remote_dns;
        var requireTCP = cfg.require_tcp_support !== false;
        var tunnelToExit = !!cfg.tunnel_to_exit;

        var tagsHtml = function(id, list, placeholder) {
          var tags = list.map(function(c){ return '<span class="tag" data-id="' + id + '">' + escapeHtml(c) + '<span class="rm" data-remove="' + escapeHtml(c) + '">&times;</span></span>'; }).join('');
          return '<div class="tag-input" data-list="' + id + '" data-store="' + escapeHtml(JSON.stringify(list)) + '">' + tags + '<input type="text" placeholder="' + (placeholder || '输入国家代码如 SG 回车添加') + '" maxlength="8" data-add="' + id + '"> </div>';
        };

        var html = '<h1>出口节点管理</h1>';
        html += '<div id="exit-msg"></div>';
        html += '<div class="card"><h3>出口选择</h3>';
        html += '<div class="form-row"><label>模式</label><select id="exit-mode">';
        html += '<option value="auto"' + (mode === 'auto' ? ' selected' : '') + '>自动选择</option>';
        html += '<option value="country_only"' + (mode === 'country_only' ? ' selected' : '') + '>仅使用指定国家/地区</option>';
        html += '<option value="country_preferred"' + (mode === 'country_preferred' ? ' selected' : '') + '>优先使用指定国家/地区</option>';
        html += '<option value="fixed_peer"' + (mode === 'fixed_peer' ? ' selected' : '') + '>固定指定出口节点</option>';
        html += '</select><div class="hint">控制每条电路最后一跳出口的筛选方式。</div></div>';

        html += '<div class="form-row" id="row-fixed"><label>固定出口 Peer ID（fixed_peer 时必填）</label><input type="text" id="exit-fixed-peer" value="' + escapeHtml(cfg.fixed_exit_peer_id || '') + '" placeholder="12D3KooW..."><div class="hint">指定每条电路最后一跳必须使用的出口节点。</div></div>';
        html += '<div class="form-row" id="row-allowed"><label>仅允许的国家/地区（country_only 时生效）</label>' + tagsHtml('allowed_countries', allowed, '如 SG、JP、TH') + '<div class="hint">仅从这些国家的出口中选择，多个用回车添加。</div></div>';
        html += '<div class="form-row" id="row-preferred"><label>优先国家/地区顺序（country_preferred 时生效）</label>' + tagsHtml('preferred_countries', preferred, '如 TH、SG、MY') + '<div class="hint">按顺序优先选择，前面的优先。</div></div>';
        html += '<div class="form-row"><label>排除指定国家/地区</label>' + tagsHtml('exclude_countries', excluded, '如 CN、US，回车添加') + '<div class="hint">任意模式生效：这些国家的出口将不会被选。</div></div>';

        html += '<div class="form-row"><label><input type="checkbox" id="exit-fallback"' + (fallback ? ' checked' : '') + '> 找不到符合条件时允许退回任意出口</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-allow-direct"' + (allowDirect ? ' checked' : '') + '> 允许直连出口（Local → Exit）</label><div class="hint">关闭则必须经至少一个 Relay。</div></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-tunnel-to-exit"' + (tunnelToExit ? ' checked' : '') + '> 本地 SOCKS5 原样转发到 Exit 的 SOCKS5</label><div class="hint">开启后，本地 1080 不再解析 SOCKS5，请求会通过 raw libp2p stream 直接转给 exit 节点上的 SOCKS5。</div></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-require-dns"' + (requireDNS ? ' checked' : '') + '> 仅选支持 Remote DNS 的出口</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-require-tcp"' + (requireTCP ? ' checked' : '') + '> 仅选支持 TCP 的出口</label></div>';
        html += '<div class="form-row"><button class="btn btn-primary" id="exit-save">保存设置</button></div>';
        html += '</div>';

        html += '<div class="card exit-candidates"><h3>当前可选出口（' + candidates.length + '）</h3>';
        if (!candidates.length) html += '<p class="empty">暂无符合当前规则的出口节点，或尚未发现任何 Exit。</p>';
        else html += '<table><thead><tr><th>Peer ID</th><th>版本</th><th>国家/地区</th></tr></thead><tbody>' +
          candidates.map(function(c){ return '<tr><td><code>' + escapeHtml((c.peer_id||'').slice(0,16)) + '</code></td><td>' + escapeHtml(c.version || '-') + '</td><td>' + escapeHtml(c.country || '-') + '</td></tr>'; }).join('') + '</tbody></table>';
        html += '</div>';

        setTimeout(function bindExitPolicy() {
          var store = { allowed_countries: allowed, preferred_countries: preferred, exclude_countries: excluded };
          document.querySelectorAll('.tag-input').forEach(function(div) {
            var listId = div.dataset.list;
            var input = div.querySelector('input[data-add]');
            if (!input) return;
            input.addEventListener('keydown', function(e) {
              if (e.key !== 'Enter') return;
              e.preventDefault();
              var v = (input.value || '').trim().toUpperCase();
              if (!v || store[listId].indexOf(v) >= 0) { input.value = ''; return; }
              store[listId].push(v);
              var tag = document.createElement('span');
              tag.className = 'tag';
              tag.setAttribute('data-id', listId);
              tag.innerHTML = escapeHtml(v) + '<span class="rm" data-remove="' + escapeHtml(v) + '">&times;</span>';
              tag.querySelector('.rm').addEventListener('click', function(){ store[listId] = store[listId].filter(function(x){ return x !== v; }); tag.remove(); });
              div.insertBefore(tag, input);
              input.value = '';
            });
            div.querySelectorAll('.rm').forEach(function(rm) {
              rm.addEventListener('click', function(){ var v = rm.dataset.remove; store[listId] = store[listId].filter(function(x){ return x !== v; }); rm.closest('.tag').remove(); });
            });
          });
          document.getElementById('exit-save').addEventListener('click', function() {
            var payload = {
              mode: document.getElementById('exit-mode').value,
              allowed_countries: store.allowed_countries,
              preferred_countries: store.preferred_countries,
              exclude_countries: store.exclude_countries,
              exclude_peer_ids: cfg.exclude_peer_ids || [],
              fixed_exit_peer_id: (document.getElementById('exit-fixed-peer') && document.getElementById('exit-fixed-peer').value) ? document.getElementById('exit-fixed-peer').value.trim() : '',
              require_remote_dns: document.getElementById('exit-require-dns').checked,
              require_tcp_support: document.getElementById('exit-require-tcp').checked,
              fallback_to_any: document.getElementById('exit-fallback').checked,
              allow_direct_exit: document.getElementById('exit-allow-direct').checked,
              tunnel_to_exit: document.getElementById('exit-tunnel-to-exit').checked
            };
            var btn = document.getElementById('exit-save');
            btn.disabled = true;
            fetch(api('/api/v1/client/exit-selection'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
              .then(function(r){ return r.json().then(function(d){ if (!r.ok) throw new Error(d.error || r.statusText); return d; }); })
              .then(function() {
                document.getElementById('exit-msg').innerHTML = '<div class="msg ok">已保存出口选择设置。</div>';
                setTimeout(function(){ show('exit-policy'); }, 600);
              })
              .catch(function(err) {
                document.getElementById('exit-msg').innerHTML = '<div class="msg err">保存失败: ' + escapeHtml(err.message) + '</div>';
                btn.disabled = false;
              })
              .then(function(){ if (document.getElementById('exit-save')) document.getElementById('exit-save').disabled = false; });
          });
        }, 0);
        return html;
      }).catch(function(err){ return '<h1>出口节点管理</h1><div class="card"><p class="empty">加载失败: ' + escapeHtml(err.message) + '</p></div>'; });
    }

    function renderExitOperatorPolicy() {
      return Promise.all([
        get('/api/v1/exit/policy').catch(function(e){ return null; }),
        get('/api/v1/exit/status').catch(function(e){ return null; })
      ]).then(function(res) {

        var runtime = (policyRes && policyRes.runtime) ? policyRes.runtime : {};
        var status = statusRes || {};
        var drainMode = !!status.drain_mode;
        var acceptNew = status.accept_new_streams !== false;

        html += '<dt>当前出口连接数</dt><dd>' + openConns + '</dd></dl>';
        html += '<div class="form-row">';

          html += '<button class="btn btn-primary" id="exit-op-resume">结束维护模式</button>';
        } else {
          html += '<button class="btn btn-primary" id="exit-op-drain">进入维护模式</button>';
        }
        html += '</div></div>';

        var arr = function(x){ return Array.isArray(x) ? x.slice() : []; };
        var allowedPorts = arr(policy.allowed_ports);
        var deniedPorts = arr(policy.denied_ports);
        var allowedDomains = arr(policy.allowed_domains);
        var deniedDomains = arr(policy.denied_domains);
        var allowedSuffixes = arr(policy.allowed_domain_suffixes);
        var deniedSuffixes = arr(policy.denied_domain_suffixes);
        var peerWhitelist = arr(policy.peer_whitelist);
        var peerBlacklist = arr(policy.peer_blacklist);

        function tagList(id, list, placeholder, isNum) {
          var displayList = list.map(function(v){ return isNum ? Number(v) : v; });
          var tags = displayList.map(function(v){ return '<span class="tag" data-list="' + id + '">' + escapeHtml(String(v)) + '<span class="rm" data-remove="' + escapeHtml(String(v)) + '">&times;</span></span>'; }).join('');
          return '<div class="tag-input" data-list="' + id + '" data-num="' + (isNum ? '1' : '0') + '">' + tags + '<input type="text" placeholder="' + (placeholder || '') + '" maxlength="200" data-add="' + id + '"></div>';
        }

        html += '<div class="card"><h3>策略配置</h3>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-allow-tcp"' + (policy.allow_tcp ? ' checked' : '') + '> 允许 TCP</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-allow-udp"' + (policy.allow_udp ? ' checked' : '') + '> 允许 UDP</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-remote-dns"' + (policy.remote_dns ? ' checked' : '') + '> 出口端解析 DNS (Remote DNS)</label></div>';
        html += '<div class="form-row"><label>允许的端口（空则仅受拒绝列表限制）</label>' + tagList('allowed_ports', allowedPorts, '端口号回车添加', true) + '</div>';
        html += '<div class="form-row"><label>拒绝的端口</label>' + tagList('denied_ports', deniedPorts, '端口号回车添加', true) + '</div>';
        html += '<div class="form-row"><label>允许的域名（精确）</label>' + tagList('allowed_domains', allowedDomains, '域名回车添加', false) + '</div>';
        html += '<div class="form-row"><label>允许的域名后缀（如 .google.com）</label>' + tagList('allowed_domain_suffixes', allowedSuffixes, '后缀回车添加', false) + '</div>';
        html += '<div class="form-row"><label>拒绝的域名（精确）</label>' + tagList('denied_domains', deniedDomains, '域名回车添加', false) + '</div>';
        html += '<div class="form-row"><label>拒绝的域名后缀</label>' + tagList('denied_domain_suffixes', deniedSuffixes, '后缀回车添加', false) + '</div>';
        html += '<div class="form-row"><label>Peer 白名单（空则不做白名单限制）</label>' + tagList('peer_whitelist', peerWhitelist, 'Peer ID 回车添加', false) + '</div>';
        html += '<div class="form-row"><label>Peer 黑名单</label>' + tagList('peer_blacklist', peerBlacklist, 'Peer ID 回车添加', false) + '</div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-allow-private"' + (policy.allow_private_ip_targets ? ' checked' : '') + '> 允许访问私网目标 IP</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-allow-loopback"' + (policy.allow_loopback_targets ? ' checked' : '') + '> 允许回环目标</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-op-allow-linklocal"' + (policy.allow_link_local_targets ? ' checked' : '') + '> 允许链路本地目标</label></div>';
        html += '<div class="form-row"><button class="btn btn-primary" id="exit-op-save-policy">保存策略</button></div>';
        html += '</div>';

        if (recentRejects.length) {
          html += '<div class="card"><h3>最近拒绝记录</h3><table><thead><tr><th>时间</th><th>原因</th></tr></thead><tbody>';
          html += recentRejects.slice(-20).reverse().map(function(r) {
            return '<tr><td>' + (r.at ? new Date(r.at).toLocaleString() : '-') + '</td><td><code>' + escapeHtml(r.reason || '') + '</code></td></tr>';
          }).join('') + '</tbody></table></div>';
        }

        setTimeout(function bindExitOp() {
          var drainBtn = document.getElementById('exit-op-drain');
          var resumeBtn = document.getElementById('exit-op-resume');
          var msgEl = document.getElementById('exit-op-msg');
          var store = {
            allowed_ports: allowedPorts.slice(),
            denied_ports: deniedPorts.slice(),
            allowed_domains: allowedDomains.slice(),
            denied_domains: deniedDomains.slice(),
            allowed_domain_suffixes: allowedSuffixes.slice(),
            denied_domain_suffixes: deniedSuffixes.slice(),
            peer_whitelist: peerWhitelist.slice(),
            peer_blacklist: peerBlacklist.slice()
          };
          function post(path, body) {
            return fetch(api(path), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined }).then(function(r) {
              if (!r.ok) return r.json().then(function(d){ throw new Error(d.error || r.statusText); });
              return r.json();
            });
          }
          document.querySelectorAll('.tag-input[data-list]').forEach(function(div) {
            var listId = div.dataset.list;
            var isNum = div.dataset.num === '1';
            var input = div.querySelector('input[data-add]');
            if (!input) return;
            input.addEventListener('keydown', function(e) {
              if (e.key !== 'Enter') return;
              e.preventDefault();
              var v = (input.value || '').trim();
              if (isNum) { var n = parseInt(v, 10); if (isNaN(n) || n < 0 || n > 65535) { input.value = ''; return; } v = n; if (store[listId].indexOf(v) >= 0) { input.value = ''; return; } }
              else { if (!v || store[listId].indexOf(v) >= 0) { input.value = ''; return; } }
              store[listId].push(v);
              var tag = document.createElement('span');
              tag.className = 'tag';
              tag.setAttribute('data-list', listId);
              tag.innerHTML = escapeHtml(String(v)) + '<span class="rm" data-remove="' + escapeHtml(String(v)) + '">&times;</span>';
              tag.querySelector('.rm').addEventListener('click', function(){ store[listId] = store[listId].filter(function(x){ return String(x) !== String(v); }); tag.remove(); });
              div.insertBefore(tag, input);
              input.value = '';
            });
            div.querySelectorAll('.rm').forEach(function(rm) {
              rm.addEventListener('click', function() {
                var v = rm.dataset.remove;
                store[listId] = store[listId].filter(function(x){ return String(x) !== v; });
                rm.closest('.tag').remove();
              });
            });
          });
          var saveBtn = document.getElementById('exit-op-save-policy');
          if (saveBtn) saveBtn.addEventListener('click', function() {
            var payload = {
              policy: {
                allow_tcp: document.getElementById('exit-op-allow-tcp').checked,
                allow_udp: document.getElementById('exit-op-allow-udp').checked,
                remote_dns: document.getElementById('exit-op-remote-dns').checked,
                allowed_ports: store.allowed_ports.slice(),
                denied_ports: store.denied_ports.slice(),
                allowed_domains: store.allowed_domains.slice(),
                denied_domains: store.denied_domains.slice(),
                allowed_domain_suffixes: store.allowed_domain_suffixes.slice(),
                denied_domain_suffixes: store.denied_domain_suffixes.slice(),
                peer_whitelist: store.peer_whitelist.slice(),
                peer_blacklist: store.peer_blacklist.slice(),
                allow_private_ip_targets: document.getElementById('exit-op-allow-private').checked,
                allow_loopback_targets: document.getElementById('exit-op-allow-loopback').checked,
                allow_link_local_targets: document.getElementById('exit-op-allow-linklocal').checked
              }
            };
            saveBtn.disabled = true;
            post('/api/v1/exit/policy', payload).then(function() {
              msgEl.innerHTML = '<div class="msg ok">策略已保存并已写回配置文件。</div>';
              show('exit-operator-policy');
            }).catch(function(err) {
              msgEl.innerHTML = '<div class="msg err">保存失败: ' + escapeHtml(err.message) + '</div>';
              saveBtn.disabled = false;
            });
          });
          if (drainBtn) drainBtn.addEventListener('click', function() {
            drainBtn.disabled = true;
            post('/api/v1/exit/drain').then(function() {
              msgEl.innerHTML = '<div class="msg ok">已进入维护模式，配置已写回文件。</div>';
              show('exit-operator-policy');
            }).catch(function(err) {
              msgEl.innerHTML = '<div class="msg err">操作失败: ' + escapeHtml(err.message) + '</div>';
              drainBtn.disabled = false;
            });
          });
          if (resumeBtn) resumeBtn.addEventListener('click', function() {
            resumeBtn.disabled = true;
            post('/api/v1/exit/resume').then(function() {
              msgEl.innerHTML = '<div class="msg ok">已结束维护模式，配置已写回文件。</div>';
              show('exit-operator-policy');
            }).catch(function(err) {
              msgEl.innerHTML = '<div class="msg err">操作失败: ' + escapeHtml(err.message) + '</div>';
              resumeBtn.disabled = false;
            });
          });
        }, 0);
        return html;
      }).catch(function(err){ return '<h1>出口政策</h1><div class="card"><p class="empty">加载失败: ' + escapeHtml(err.message) + '</p></div>'; });
    }

    function renderLogs(data) {
      var list = Array.isArray(data) ? data : [];
      if (!list.length) return '<h1>日志面板</h1><div class="card"><p class="empty">尚无最近错误记录</p></div>';
      return '<h1>日志面板</h1><div class="card"><h3>最近错误</h3>' +
        list.map(function(e){ return '<div class="log-line"><span class="ts">' + (e.at ? new Date(e.at).toLocaleTimeString() : '') + '</span><span class="cat">[' + escapeHtml(e.category || '') + ']</span>' + escapeHtml(e.message || '') + '</div>'; }).join('') + '</div>';
    }
    function escapeHtml(s) { if (s == null) return ''; var div = document.createElement('div'); div.textContent = s; return div.innerHTML; }
    function formatHealth(alive, rtt, failures, lastPing, lastPong) {
      var badgeClass = alive ? 'badge ok' : 'badge err';
      var label = alive ? '正常' : '失联';
      var rttNum = Number(rtt);
      var rttText = Number.isFinite(rttNum) ? rttNum.toFixed(1) + ' ms' : '—';
      var failureText = failures > 0 ? ' fail×' + failures : '';
      var titleParts = [];
      if (lastPing) {
        var d = new Date(lastPing);
        if (!Number.isNaN(d.valueOf())) {
          titleParts.push('Ping: ' + d.toLocaleTimeString());
        }
      }
      if (lastPong) {
        var d = new Date(lastPong);
        if (!Number.isNaN(d.valueOf())) {
          titleParts.push('Pong: ' + d.toLocaleTimeString());
        }
      }
      var title = titleParts.length ? titleParts.join(' / ') : '心跳状态';
      return '<span class="' + badgeClass + '" title="' + escapeHtml(title) + '">' + label + (alive && rttText !== '—' ? ' ' + rttText : '') + failureText + '</span>';
    }
    function formatBytes(value) {
      if (value == null || value === '') return '-';
      var num = Number(value);
      if (!Number.isFinite(num)) return '-';
      var units = ['B', 'KB', 'MB', 'GB', 'TB'];
      var n = num;
      var idx = 0;
      while (n >= 1024 && idx < units.length - 1) {
        n /= 1024;
        idx++;
      }
      if (idx === 0) {
        return Math.round(n) + ' ' + units[idx];
      }
      return n.toFixed(1) + ' ' + units[idx];
    }
    function formatUptime(sec) { if (sec == null) return '-'; var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60); return [h,m,s].map(function(v){ return String(v).padStart(2,'0'); }).join(':'); }

    var COLLAPSE_KEY = 'meshproxy-console-sidebar-collapsed';
    var sidebar = document.querySelector('.sidebar');
    var collapseToggle = document.querySelector('.collapse-toggle');
    function applySidebarState(collapsed) {
      if (!sidebar) return;
      sidebar.classList.toggle('collapsed', collapsed);
      if (collapseToggle) {
        collapseToggle.setAttribute('aria-pressed', collapsed ? 'true' : 'false');
      }
    }
    function readSavedState() {
      try {
        return localStorage.getItem(COLLAPSE_KEY) === '1';
      } catch (e) { return false; }
    }
    function writeState(value) {
      try { localStorage.setItem(COLLAPSE_KEY, value ? '1' : '0'); } catch (e) {}
    }
    if (sidebar && collapseToggle) {
      applySidebarState(readSavedState());
      collapseToggle.addEventListener('click', function() {
        var nextState = !sidebar.classList.contains('collapsed');
        applySidebarState(nextState);
        writeState(nextState);
      });
    }
    var langSelect = document.getElementById('lang-select');
    if (langSelect) {
      langSelect.addEventListener('change', function() {
        currentLocale = langSelect.value || 'zh';
        writeLocale(currentLocale);
        applyStaticI18n();
        onNav();
      });
    }
    var pages = {
      status: function(){ return get('/api/v1/status').then(renderStatus); },
      relays: function(){ return Promise.all([get('/api/v1/relays').catch(function(){ return []; }), get('/api/v1/exits').catch(function(){ return []; })]).then(function(r){ return renderRelaysExits(r[0], r[1]); }); },
      circuits: function(){ return get('/api/v1/circuits').then(renderCircuits); },
      streams: function(){ return get('/api/v1/streams').then(renderStreams); },
      'circuit-pool': function(){ return renderCircuitPoolConfig(); },
      traffic: function(){ return get('/api/v1/metrics/summary').then(renderTraffic); },
      routing: function(){ return Promise.resolve(renderRouting()); },
      'exit-policy': function(){ return renderExitPolicy(); },
      'exit-operator-policy': function(){ return renderExitOperatorPolicy(); },
      logs: function(){ return get('/api/v1/errors/recent').then(renderLogs); }
    };
    function show(page) {
      var el = document.getElementById('content');
      el.innerHTML = '<p class="refresh">' + escapeHtml(ts('loading')) + '</p>';
      (pages[page] || pages.status)().then(function(html){ el.innerHTML = translateHtml(html); }).catch(function(err){ el.innerHTML = '<div class="card"><p class="empty">' + escapeHtml(ts('load_failed')) + escapeHtml(err.message) + '</p></div>'; });
    }
    function onNav() {
      var hash = (location.hash || '#status').slice(1) || 'status';
      document.querySelectorAll('.sidebar a').forEach(function(a){ a.classList.toggle('active', a.dataset.page === hash); });
      show(hash);
    }
    window.addEventListener('hashchange', onNav);
    window.addEventListener('load', function(){ applyStaticI18n(); onNav(); setInterval(onNav, 8000); });
  </script>
</body>
</html>
