<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meshproxy 控制台</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--panel); border-right: 1px solid var(--border); padding: 1rem 0; flex-shrink: 0; position: relative; transition: width 0.2s ease, border 0.2s ease; }
    .sidebar h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); padding: 0 1rem; margin: 0 0 0.5rem; }
    .sidebar a { display: block; padding: 0.5rem 1rem; color: var(--text); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
    .sidebar a:hover { background: rgba(255,255,255,0.05); }
    .sidebar a.active { border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
    .sidebar .nav-label {}
    .collapse-toggle {
      position: absolute;
      top: 0.6rem;
      right: 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      padding: 0.25rem 0.55rem;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      transition: background 0.15s ease;
    }
    .collapse-toggle:hover { background: rgba(255,255,255,0.04); }
    .sidebar.collapsed { width: 64px; border-right-color: rgba(255,255,255,0.08); }
    .sidebar.collapsed .sidebar-title { display: none; }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar.collapsed a { padding: 0.4rem 0; text-align: center; border-left: none; }
    .sidebar.collapsed .collapse-toggle { right: 0.35rem; }
    .main { flex: 1; padding: 1.5rem; overflow: auto; }
    .main h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .card h3 { font-size: 0.95rem; margin: 0 0 0.75rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: 0; }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 0.25rem 1rem; font-size: 0.875rem; }
    .kv dt { color: var(--muted); margin: 0; }
    .kv dd { margin: 0; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .badge.ok { background: rgba(63,185,80,0.2); color: var(--ok); }
    .badge.warn { background: rgba(210,153,34,0.2); color: var(--warn); }
    .badge.err { background: rgba(248,81,73,0.2); color: var(--err); }
    .log-line { font-family: ui-monospace, monospace; font-size: 0.8rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    .log-line .ts { color: var(--muted); margin-right: 0.5rem; }
    .log-line .cat { color: var(--accent); margin-right: 0.5rem; }
    .empty { color: var(--muted); font-style: italic; }
    .refresh { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .path-hop { display: inline-block; margin-right: 0.25rem; padding: 0.1rem 0.4rem; background: var(--border); border-radius: 4px; font-size: 0.8rem; }
    .form-row { margin-bottom: 0.75rem; }
    .form-row label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.25rem; }
    .form-row select, .form-row input[type=text] { width: 100%; max-width: 280px; padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .form-row .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .tag-input { display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center; padding: 0.4rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; min-height: 38px; }
    .tag-input input { flex: 1; min-width: 60px; background: none; border: none; color: var(--text); padding: 0.2rem; font-size: 0.9rem; }
    .tag-input input:focus { outline: none; }
    .tag { display: inline-flex; align-items: center; padding: 0.15rem 0.4rem; background: var(--border); border-radius: 4px; font-size: 0.8rem; }
    .tag .rm { cursor: pointer; margin-left: 0.35rem; color: var(--muted); }
    .tag .rm:hover { color: var(--err); }
    .btn { padding: 0.4rem 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.875rem; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: #79b8ff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .exit-candidates { margin-top: 1rem; }
    .exit-candidates table { font-size: 0.8rem; }
    .msg { padding: 0.5rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .msg.ok { background: rgba(63,185,80,0.15); color: var(--ok); }
    .msg.err { background: rgba(248,81,73,0.15); color: var(--err); }
    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.3rem;
        padding: 0.5rem 0.75rem;
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--panel);
      }
      .sidebar h2 { display: none; }
      .sidebar a {
        flex: 1 1 120px;
        border-left: none;
        border-radius: 6px;
        text-align: center;
        font-size: 0.8rem;
        padding: 0.4rem 0.5rem;
      }
      .main { padding: 1rem; }
    }
    @media (max-width: 640px) {
      .sidebar {
        justify-content: flex-start;
        overflow-x: auto;
      }
      .sidebar a {
        flex: 0 0 auto;
        min-width: 120px;
        white-space: nowrap;
      }
      .card {
        padding: 0.9rem;
      }
      .kv {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.25rem 0.85rem;
      }
      .card table {
        font-size: 0.78rem;
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      .main {
        padding-top: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <button class="collapse-toggle" type="button" aria-label="折叠菜单" aria-pressed="false">☰</button>
      <h2 class="sidebar-title">控制台</h2>
      <a href="#status" data-page="status" class="active"><span class="nav-label">節點狀態</span></a>
      <a href="#relays" data-page="relays"><span class="nav-label">Relay / Exit</span></a>
      <a href="#circuits" data-page="circuits"><span class="nav-label">Circuit 列表</span></a>
      <a href="#streams" data-page="streams"><span class="nav-label">Stream 列表</span></a>
      <a href="#circuit-pool" data-page="circuit-pool"><span class="nav-label">電路池</span></a>
      <a href="#traffic" data-page="traffic"><span class="nav-label">即時流量</span></a>
      <a href="#routing" data-page="routing"><span class="nav-label">路由規則</span></a>
      <a href="#exit-policy" data-page="exit-policy"><span class="nav-label">出口选择</span></a>
      <a href="#logs" data-page="logs"><span class="nav-label">日誌面板</span></a>
    </nav>
    <main class="main">
      <div id="content"></div>
    </main>
  </div>
  <script>
    const API = ''; // same origin
    function api(path) { return (API || '') + path; }
    function get(path) { return fetch(api(path)).then(r => r.ok ? r.json() : Promise.reject(new Error(r.statusText))); }
    function post(path, body) {
      return fetch(api(path), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      }).then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(new Error(d.error || r.statusText))));
    }

    function renderStatus(data) {
      const pool = data.circuit_pool || {};
      const poolHtml = Object.keys(pool.kinds || {}).length
        ? '<dl class="kv"><dt>電路池</dt><dd><pre style="margin:0;font-size:0.8rem">' + JSON.stringify(pool.kinds, null, 2) + '</pre></dd></dl>'
        : '';
      return `
        <h1>節點狀態</h1>
        <div class="card">
          <h3>基本資訊</h3>
          <dl class="kv">
            <dt>Peer ID</dt><dd><code>${escapeHtml(data.peer_id || '-')}</code></dd>
            <dt>模式</dt><dd><span class="badge ok">${escapeHtml(data.mode || '-')}</span></dd>
            <dt>SOCKS5</dt><dd>${escapeHtml(data.socks5_listen || '-')}</dd>
            <dt>運行時長</dt><dd>${formatUptime(data.uptime_seconds)}</dd>
            <dt>已知 Relay</dt><dd>${data.relays_known ?? '-'}</dd>
            <dt>已知 Exit</dt><dd>${data.exits_known ?? '-'}</dd>
            <dt>P2P 監聽</dt><dd><pre style="margin:0;font-size:0.8rem">${(data.p2p_listen_addrs || []).map(escapeHtml).join('\n') || '-'}</pre></dd>
          </dl>
          ${poolHtml}
        </div>
      `;
    }
    function renderNodeTable(list, title) {
      if (!list.length) return '<div class="card"><h3>' + title + '</h3><p class="empty">尚無節點</p></div>';
      return '<div class="card"><h3>' + title + '</h3><table><thead><tr><th>Peer ID</th><th>版本</th><th>角色</th><th>國家/地區</th></tr></thead><tbody>' +
        list.map(n => '<tr><td><code>' + escapeHtml(n.peer_id) + '</code></td><td>' + escapeHtml(n.version || '-') + '</td><td>' + (n.exit && n.relay ? 'relay+exit' : n.exit ? 'exit' : 'relay') + '</td><td>' + escapeHtml(n.country || '-') + '</td></tr>').join('') + '</tbody></table></div>';
    }
    function renderRelaysExits(relays, exits) {
      const r = Array.isArray(relays) ? relays : [];
      const e = Array.isArray(exits) ? exits : [];
      return '<h1>Relay / Exit</h1>' + renderNodeTable(r, '已知 Relay') + renderNodeTable(e, '已知 Exit');
    }
    function renderCircuits(data) {
      const list = Array.isArray(data) ? data : [];
      if (!list.length) return '<h1>Circuit 列表</h1><div class="card"><p class="empty">目前無電路</p></div>';
      return '<h1>Circuit 列表</h1><div class="card"><table><thead><tr><th>ID</th><th>狀態</th><th>心跳</th><th>路徑</th><th>發送</th><th>接收</th><th>建立時間</th></tr></thead><tbody>' +
        list.map(c => {
          const path = (c.plan && c.plan.hops) ? c.plan.hops.map(h => '<span class="path-hop">' + (h.is_exit ? 'exit' : 'relay') + '</span>').join(' → ') : '-';
          const heartbeatInfo = formatHealth(c.alive, c.smoothed_rtt_ms, c.consecutive_failures, c.last_ping_at, c.last_pong_at);
          return '<tr><td><code>' + escapeHtml(c.id?.slice(0,8) || '-') + '</code></td><td><span class="badge ok">' + escapeHtml(c.state || '-') + '</span></td><td>' + heartbeatInfo + '</td><td>' + path + '</td><td>' + formatBytes(c.bytes_sent) + '</td><td>' + formatBytes(c.bytes_received) + '</td><td>' + (c.created_at ? new Date(c.created_at).toLocaleString() : '-') + '</td></tr>';
        }).join('') + '</tbody></table></div>';
    }
    function renderStreams(data) {
      const list = Array.isArray(data) ? data : [];
      if (!list.length) return '<h1>Stream 列表</h1><div class="card"><p class="empty">目前無 stream</p></div>';
      return '<h1>Stream 列表</h1><div class="card"><table><thead><tr><th>ID</th><th>Circuit</th><th>目標</th><th>狀態</th></tr></thead><tbody>' +
        list.map(s => '<tr><td><code>' + escapeHtml(s.id?.slice(0,8) || '-') + '</code></td><td><code>' + escapeHtml(s.circuit_id?.slice(0,8) || '-') + '</code></td><td>' + escapeHtml(s.target_host || '-') + ':' + (s.target_port || '-') + '</td><td>' + escapeHtml(s.state || '-') + '</td></tr>').join('') + '</tbody></table></div>';
    }
    function renderTraffic(data) {
      if (!data || typeof data !== 'object') return '<h1>即時流量</h1><div class="card"><p class="empty">無法取得指標</p></div>';
      return '<h1>即時流量</h1><div class="card"><h3>彙總</h3><dl class="kv">' +
        '<dt>電路總數</dt><dd>' + (data.circuits_total ?? '-') + '</dd>' +
        '<dt>活躍 Stream</dt><dd>' + (data.streams_active ?? '-') + '</dd>' +
        '<dt>已知 Relay</dt><dd>' + (data.relays_known ?? '-') + '</dd>' +
        '<dt>已知 Exit</dt><dd>' + (data.exits_known ?? '-') + '</dd>' +
        '<dt>最近錯誤數</dt><dd>' + (data.errors_recent_count ?? 0) + '</dd>' +
        (data.pool_status && data.pool_status.kinds ? '<dt>電路池</dt><dd><pre style="margin:0;font-size:0.8rem">' + JSON.stringify(data.pool_status.kinds, null, 2) + '</pre></dd>' : '') +
        '</dl></div>';
    }
    function renderRouting() {
      return '<h1>路由規則</h1><div class="card"><p class="empty">路由規則介面尚未開放，請透過設定檔或 API 設定。</p></div>';
    }
    function renderCircuitPoolConfig() {
      return get('/api/v1/client/circuit-pool').then(cfg => {
        cfg = cfg || {};
        let html = '<h1>電路池</h1><div id="pool-msg"></div><div class="card"><h3>總量控制</h3>';
        html += '<div class="form-row"><label>最小總數 `min_total`</label><input type="text" id="pool-min-total" value="' + escapeHtml(String(cfg.min_total ?? 1)) + '" inputmode="numeric"></div>';
        html += '<div class="form-row"><label>最大總數 `max_total`</label><input type="text" id="pool-max-total" value="' + escapeHtml(String(cfg.max_total ?? 1)) + '" inputmode="numeric"></div>';
        html += '<div class="form-row"><div class="hint">預設只維持 1 條 circuit。儲存後會立即更新運行中的池子，並寫回配置文件。</div></div>';
        html += '<div class="form-row"><label>每池最小 / 最大（唯讀）</label><div class="hint">min_per_pool=' + escapeHtml(String(cfg.min_per_pool ?? '-')) + '，max_per_pool=' + escapeHtml(String(cfg.max_per_pool ?? '-')) + '</div></div>';
        html += '<div class="form-row"><button class="btn btn-primary" id="pool-save">儲存設定</button></div></div>';
        setTimeout(() => {
          const saveBtn = document.getElementById('pool-save');
          if (!saveBtn) return;
          saveBtn.onclick = () => {
            const minTotal = Number((document.getElementById('pool-min-total')?.value || '').trim());
            const maxTotal = Number((document.getElementById('pool-max-total')?.value || '').trim());
            if (!Number.isInteger(minTotal) || !Number.isInteger(maxTotal) || minTotal <= 0 || maxTotal <= 0) {
              document.getElementById('pool-msg').innerHTML = '<div class="msg err">請輸入正整數。</div>';
              return;
            }
            if (maxTotal < minTotal) {
              document.getElementById('pool-msg').innerHTML = '<div class="msg err">`max_total` 不能小於 `min_total`。</div>';
              return;
            }
            saveBtn.disabled = true;
            post('/api/v1/client/circuit-pool', { min_total: minTotal, max_total: maxTotal })
              .then(() => {
                document.getElementById('pool-msg').innerHTML = '<div class="msg ok">已儲存電路池設定。</div>';
                setTimeout(() => show('circuit-pool'), 600);
              })
              .catch(err => {
                document.getElementById('pool-msg').innerHTML = '<div class="msg err">儲存失敗: ' + escapeHtml(err.message) + '</div>';
              })
              .finally(() => { if (document.getElementById('pool-save')) document.getElementById('pool-save').disabled = false; });
          };
        }, 0);
        return html;
      }).catch(err => '<h1>電路池</h1><div class="card"><p class="empty">載入失敗: ' + escapeHtml(err.message) + '</p></div>');
    }
    function renderExitPolicy() {
      return Promise.all([
        get('/api/v1/client/exit-selection').catch(() => ({})),
        get('/api/v1/client/exit-candidates').catch(() => ({ candidates: [] })),
      ]).then(([cfg, cand]) => {
        cfg = cfg || {};
        const candidates = Array.isArray(cand?.candidates) ? cand.candidates : [];
        const allowed = (cfg.allowed_countries || []).slice();
        const preferred = (cfg.preferred_countries || []).slice();
        const excluded = (cfg.exclude_countries || []).slice();
        const mode = cfg.mode || 'auto';
        const fallback = cfg.fallback_to_any !== false;
        const allowDirect = cfg.allow_direct_exit !== false;
        const requireDNS = !!cfg.require_remote_dns;
        const requireTCP = cfg.require_tcp_support !== false;
        const tagsHtml = (id, list, placeholder) => {
          const tags = list.map(c => '<span class="tag" data-id="' + id + '">' + escapeHtml(c) + '<span class="rm" data-remove="' + escapeHtml(c) + '">&times;</span></span>').join('');
          return '<div class="tag-input" data-list="' + id + '">' + tags + '<input type="text" placeholder="' + (placeholder || '輸入國家代碼如 SG 按 Enter 新增') + '" maxlength="8" data-add="' + id + '"></div>';
        };
        let html = '<h1>出口節點管理</h1><div id="exit-msg"></div><div class="card"><h3>出口選擇</h3>';
        html += '<div class="form-row"><label>模式</label><select id="exit-mode">';
        html += '<option value="auto"' + (mode === 'auto' ? ' selected' : '') + '>自動選擇</option>';
        html += '<option value="country_only"' + (mode === 'country_only' ? ' selected' : '') + '>僅使用指定國家/地區</option>';
        html += '<option value="country_preferred"' + (mode === 'country_preferred' ? ' selected' : '') + '>優先使用指定國家/地區</option>';
        html += '<option value="fixed_peer"' + (mode === 'fixed_peer' ? ' selected' : '') + '>固定指定出口節點</option></select>';
        html += '<div class="hint">控制每條電路最後一跳出口的篩選方式。</div></div>';
        html += '<div class="form-row"><label>固定出口 Peer ID（fixed_peer 時必填）</label><input type="text" id="exit-fixed-peer" value="' + escapeHtml(cfg.fixed_exit_peer_id || '') + '" placeholder="12D3KooW..."></div>';
        html += '<div class="form-row"><label>僅允許的國家/地區（country_only 時生效）</label>' + tagsHtml('allowed_countries', allowed, '如 SG、JP、TH') + '</div>';
        html += '<div class="form-row"><label>優先國家/地區順序（country_preferred 時生效）</label>' + tagsHtml('preferred_countries', preferred, '如 TH、SG、MY') + '</div>';
        html += '<div class="form-row"><label>排除指定國家/地區</label>' + tagsHtml('exclude_countries', excluded, '如 CN、US，Enter 新增') + '<div class="hint">任意模式生效：這些國家的出口將不會被選。</div></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-fallback"' + (fallback ? ' checked' : '') + '> 找不到符合條件時允許退回任意出口</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-allow-direct"' + (allowDirect ? ' checked' : '') + '> 允許直連出口（Local → Exit）</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-require-dns"' + (requireDNS ? ' checked' : '') + '> 僅選支援 Remote DNS 的出口</label></div>';
        html += '<div class="form-row"><label><input type="checkbox" id="exit-require-tcp"' + (requireTCP ? ' checked' : '') + '> 僅選支援 TCP 的出口</label></div>';
        html += '<div class="form-row"><button class="btn btn-primary" id="exit-save">儲存設定</button></div></div>';
        html += '<div class="card exit-candidates"><h3>目前可選出口（' + candidates.length + '）</h3>';
        if (!candidates.length) html += '<p class="empty">暫無符合目前規則的出口節點，或尚未發現任何 Exit。</p>';
        else html += '<table><thead><tr><th>Peer ID</th><th>版本</th><th>國家/地區</th></tr></thead><tbody>' +
          candidates.map(c => '<tr><td><code>' + escapeHtml((c.peer_id||'').slice(0,16)) + '</code></td><td>' + escapeHtml(c.version || '-') + '</td><td>' + escapeHtml(c.country || '-') + '</td></tr>').join('') + '</tbody></table>';
        html += '</div>';
        setTimeout(() => {
          const store = { allowed_countries: allowed, preferred_countries: preferred, exclude_countries: excluded };
          document.querySelectorAll('.tag-input').forEach(div => {
            const listId = div.dataset.list;
            const input = div.querySelector('input[data-add]');
            if (!input) return;
            input.addEventListener('keydown', e => {
              if (e.key !== 'Enter') return;
              e.preventDefault();
              const v = (input.value || '').trim().toUpperCase();
              if (!v || store[listId].indexOf(v) >= 0) { input.value = ''; return; }
              store[listId].push(v);
              const tag = document.createElement('span');
              tag.className = 'tag';
              tag.setAttribute('data-id', listId);
              tag.innerHTML = escapeHtml(v) + '<span class="rm" data-remove="' + escapeHtml(v) + '">&times;</span>';
              tag.querySelector('.rm').onclick = () => { store[listId] = store[listId].filter(x => x !== v); tag.remove(); };
              div.insertBefore(tag, input);
              input.value = '';
            });
            div.querySelectorAll('.rm').forEach(rm => {
              rm.onclick = () => { const v = rm.dataset.remove; store[listId] = store[listId].filter(x => x !== v); rm.closest('.tag').remove(); };
            });
          });
          const saveBtn = document.getElementById('exit-save');
          if (saveBtn) saveBtn.onclick = () => {
            const payload = {
              mode: document.getElementById('exit-mode').value,
              allowed_countries: store.allowed_countries,
              preferred_countries: store.preferred_countries,
              exclude_countries: store.exclude_countries,
              exclude_peer_ids: cfg.exclude_peer_ids || [],
              fixed_exit_peer_id: (document.getElementById('exit-fixed-peer')?.value || '').trim(),
              require_remote_dns: document.getElementById('exit-require-dns').checked,
              require_tcp_support: document.getElementById('exit-require-tcp').checked,
              fallback_to_any: document.getElementById('exit-fallback').checked,
              allow_direct_exit: document.getElementById('exit-allow-direct').checked,
            };
            saveBtn.disabled = true;
            post('/api/v1/client/exit-selection', payload)
              .then(() => {
                document.getElementById('exit-msg').innerHTML = '<div class="msg ok">已儲存出口選擇設定。</div>';
                setTimeout(() => show('exit-policy'), 600);
              })
              .catch(err => {
                document.getElementById('exit-msg').innerHTML = '<div class="msg err">儲存失敗: ' + escapeHtml(err.message) + '</div>';
              })
              .finally(() => { if (document.getElementById('exit-save')) document.getElementById('exit-save').disabled = false; });
          };
        }, 0);
        return html;
      }).catch(err => '<h1>出口節點管理</h1><div class="card"><p class="empty">載入失敗: ' + escapeHtml(err.message) + '</p></div>');
    }
    function renderLogs(data) {
      const list = Array.isArray(data) ? data : [];
      if (!list.length) return '<h1>日誌面板</h1><div class="card"><p class="empty">尚無最近錯誤紀錄</p></div>';
      return '<h1>日誌面板</h1><div class="card"><h3>最近錯誤</h3>' +
        list.map(e => '<div class="log-line"><span class="ts">' + (e.at ? new Date(e.at).toLocaleTimeString() : '') + '</span><span class="cat">[' + escapeHtml(e.category || '') + ']</span>' + escapeHtml(e.message || '') + '</div>').join('') + '</div>';
    }
    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function formatBytes(value) {
      if (value == null || value === '') return '-';
      const num = Number(value);
      if (!Number.isFinite(num)) return '-';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let n = num;
      let idx = 0;
      while (n >= 1024 && idx < units.length - 1) {
        n /= 1024;
        idx++;
      }
      if (idx === 0) {
        return Math.round(n) + ' ' + units[idx];
      }
      return n.toFixed(1) + ' ' + units[idx];
    }
    function formatHealth(alive, rtt, failures, lastPing, lastPong) {
      const badgeClass = alive ? 'badge ok' : 'badge err';
      const label = alive ? '正常' : '失联';
      const rttNum = Number(rtt);
      const rttText = Number.isFinite(rttNum) ? rttNum.toFixed(1) + ' ms' : '—';
      const failureText = failures > 0 ? ' fail×' + failures : '';
      const titleParts = [];
      if (lastPing) {
        const d = new Date(lastPing);
        if (!Number.isNaN(d.valueOf())) {
          titleParts.push('Ping: ' + d.toLocaleTimeString());
        }
      }
      if (lastPong) {
        const d = new Date(lastPong);
        if (!Number.isNaN(d.valueOf())) {
          titleParts.push('Pong: ' + d.toLocaleTimeString());
        }
      }
      const title = titleParts.length ? titleParts.join(' / ') : '心跳状态';
      return '<span class="' + badgeClass + '" title="' + escapeHtml(title) + '">' + label + (alive && rttText !== '—' ? ' ' + rttText : '') + failureText + '</span>';
    }
    function formatUptime(sec) {
      if (sec == null) return '-';
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    }

    const pages = {
      status: () => get('/api/v1/status').then(renderStatus),
      relays: () => Promise.all([get('/api/v1/relays').catch(() => []), get('/api/v1/exits').catch(() => [])]).then(([r,e]) => renderRelaysExits(r, e)),
      circuits: () => get('/api/v1/circuits').then(renderCircuits),
      streams: () => get('/api/v1/streams').then(renderStreams),
      'circuit-pool': () => renderCircuitPoolConfig(),
      traffic: () => get('/api/v1/metrics/summary').then(renderTraffic),
      routing: () => Promise.resolve(renderRouting()),
      'exit-policy': () => renderExitPolicy(),
      logs: () => get('/api/v1/errors/recent').then(renderLogs),
    };
    const COLLAPSE_KEY = 'meshproxy-console-sidebar-collapsed';
    const sidebar = document.querySelector('.sidebar');
    const collapseToggle = document.querySelector('.collapse-toggle');
    function applySidebarState(collapsed) {
      sidebar?.classList.toggle('collapsed', collapsed);
      if (collapseToggle) {
        collapseToggle.setAttribute('aria-pressed', collapsed ? 'true' : 'false');
      }
    }
    function readSavedState() {
      try {
        return localStorage.getItem(COLLAPSE_KEY) === '1';
      } catch {
        return false;
      }
    }
    function writeState(value) {
      try { localStorage.setItem(COLLAPSE_KEY, value ? '1' : '0'); } catch {}
    }
    if (sidebar && collapseToggle) {
      applySidebarState(readSavedState());
      collapseToggle.addEventListener('click', () => {
        const nextState = !sidebar.classList.contains('collapsed');
        applySidebarState(nextState);
        writeState(nextState);
      });
    }
    function show(page) {
      const el = document.getElementById('content');
      el.innerHTML = '<p class="refresh">載入中…</p>';
      (pages[page] || pages.status)()
        .then(html => { el.innerHTML = html; })
        .catch(err => { el.innerHTML = '<div class="card"><p class="empty">載入失敗: ' + escapeHtml(err.message) + '</p></div>'; });
    }
    function onNav() {
      const hash = (location.hash || '#status').slice(1) || 'status';
      document.querySelectorAll('.sidebar a').forEach(a => { a.classList.toggle('active', a.dataset.page === hash); });
      show(hash);
    }
    window.addEventListener('hashchange', onNav);
    window.addEventListener('load', () => { onNav(); setInterval(onNav, 8000); });
  </script>
</body>
</html>
