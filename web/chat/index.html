<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meshproxy 聊天</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --panel-soft: #16202c;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: rgba(88,166,255,0.10);
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: radial-gradient(circle at top, rgba(88,166,255,0.10), transparent 35%), var(--bg); color: var(--text); }
    .shell { max-width: 1360px; margin: 0 auto; padding: 1rem; }
    h1 { margin: 0 0 1rem; font-size: 1.4rem; letter-spacing: 0.02em; }
    .grid { display: grid; grid-template-columns: minmax(0, 340px) minmax(0, 1fr); gap: 1rem; align-items: start; }
    .stack { display: grid; gap: 1rem; min-width: 0; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.18); }
    .card h2 { margin: 0 0 0.75rem; font-size: 0.96rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 0.4rem 0.8rem; font-size: 0.9rem; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; word-break: break-all; }
    .form-row { margin-bottom: 0.75rem; }
    .form-row label { display: block; color: var(--muted); font-size: 0.84rem; margin-bottom: 0.25rem; }
    .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 0.48rem 0.62rem; background: rgba(8,17,28,0.8); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
    .form-row textarea { min-height: 86px; resize: vertical; }
    .btn { border: none; border-radius: 8px; padding: 0.5rem 0.9rem; cursor: pointer; transition: transform 120ms ease, opacity 120ms ease, border-color 120ms ease; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #08111c; font-weight: 600; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: rgba(248,81,73,0.15); color: var(--err); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .message-actions {
      justify-content: flex-start;
    }
    .message-revoke-btn {
      padding: 0.34rem 0.7rem;
      font-size: 0.8rem;
      line-height: 1.1;
      border-radius: 999px;
    }
    .list { display: grid; gap: 0.55rem; }
    .item { border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem; background: rgba(255,255,255,0.02); min-width: 0; }
    .item.active { border-color: var(--accent); background: rgba(88,166,255,0.08); box-shadow: inset 0 0 0 1px rgba(88,166,255,0.16); }
    .item h3 { margin: 0 0 0.25rem; font-size: 0.94rem; }
    .muted { color: var(--muted); font-size: 0.82rem; }
    .empty { color: var(--muted); font-style: italic; }
    .msg { padding: 0.55rem 0.7rem; border-radius: 8px; margin-bottom: 0.8rem; }
    .msg.ok { background: rgba(63,185,80,0.12); color: var(--ok); }
    .msg.err { background: rgba(248,81,73,0.12); color: var(--err); }
    .msg.info { background: rgba(88,166,255,0.12); color: var(--accent); }
    .chat-layout { display: grid; grid-template-rows: auto 1fr auto; min-height: 76vh; }
    .messages { display: grid; gap: 0.75rem; max-height: min(62vh, 62dvh); overflow: auto; padding-right: 0.2rem; min-width: 0; }
    .message-row { display: flex; gap: 0.65rem; align-items: flex-end; min-width: 0; }
    .message-row.outbound { flex-direction: row-reverse; }
    .message-row.inbound { flex-direction: row; }
    .message-avatar { flex: 0 0 auto; }
    .message-stack {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
      max-width: min(76%, 740px);
    }
    .message-row.outbound .message-stack { align-items: flex-end; margin-left: auto; }
    .message-row.inbound .message-stack { align-items: flex-start; margin-right: auto; }
    .bubble {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.82rem 0.92rem;
      background: rgba(255,255,255,0.03);
      min-width: 0;
      width: fit-content;
      max-width: 100%;
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
    }
    .bubble.outbound { background: rgba(88,166,255,0.10); border-color: rgba(88,166,255,0.25); }
    .bubble .meta { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.4rem; display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .composer textarea { min-height: 100px; }
    code { font-family: ui-monospace, monospace; }
    .status-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-top: 0.55rem; }
    .badge { display: inline-flex; align-items: center; padding: 0.18rem 0.55rem; border-radius: 999px; font-size: 0.78rem; border: 1px solid transparent; }
    .badge.direct { background: rgba(63,185,80,0.12); color: var(--ok); border-color: rgba(63,185,80,0.25); }
    .badge.relay { background: rgba(88,166,255,0.12); color: var(--accent); border-color: rgba(88,166,255,0.25); }
    .badge.warn { background: rgba(210,153,34,0.14); color: var(--warn); border-color: rgba(210,153,34,0.3); }
    .badge.offline { background: rgba(248,81,73,0.12); color: var(--err); border-color: rgba(248,81,73,0.25); }
    .badge.msg-local { background: rgba(255,255,255,0.06); color: var(--muted); border-color: rgba(255,255,255,0.12); }
    .badge.msg-sent { background: rgba(88,166,255,0.12); color: var(--accent); border-color: rgba(88,166,255,0.25); }
    .badge.msg-delivered { background: rgba(63,185,80,0.12); color: var(--ok); border-color: rgba(63,185,80,0.25); }
    .badge.msg-failed { background: rgba(248,81,73,0.12); color: var(--err); border-color: rgba(248,81,73,0.25); }
    .badge.msg-retry { background: rgba(210,153,34,0.14); color: var(--warn); border-color: rgba(210,153,34,0.30); }
    .refresh-bar { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; margin: 0 0 1rem; color: var(--muted); font-size: 0.82rem; }
    .refresh-pill { padding: 0.24rem 0.6rem; border-radius: 999px; background: rgba(255,255,255,0.04); }
    .contact-kv { margin-top: 0.65rem; grid-template-columns: 112px minmax(0, 1fr); }
    .contact-kv dd { line-height: 1.45; }
    .contact-actions { margin-top: 0.7rem; display: grid; gap: 0.45rem; }
    .contact-header { display: grid; gap: 0.25rem; }
    .contact-header-top { display: flex; justify-content: space-between; gap: 0.65rem; align-items: flex-start; }
    .contact-header-title { display: grid; gap: 0.16rem; min-width: 0; }
    .contact-header-title h3 { margin: 0; }
    .contact-chip-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .avatar {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(135deg, rgba(88,166,255,0.30), rgba(63,185,80,0.16));
      color: #f4f7fb;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-fallback {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 0.05rem;
      font-size: 0.72em;
      line-height: 1;
      text-align: center;
    }
    .avatar.has-image .avatar-fallback { opacity: 0; }
    .avatar-broken img { display: none; }
    .avatar-xs { width: 24px; height: 24px; }
    .avatar-sm { width: 32px; height: 32px; }
    .avatar-md { width: 40px; height: 40px; }
    .avatar-lg { width: 60px; height: 60px; }
    .avatar-xl { width: 72px; height: 72px; }
    .profile-hero {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.9rem;
    }
    .profile-hero-body {
      min-width: 0;
      display: grid;
      gap: 0.25rem;
    }
    .profile-hero-title {
      font-size: 1rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .profile-hero-subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      word-break: break-all;
    }
    .profile-avatar-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.7rem;
    }
    .request-header-row,
    .contact-header-row,
    .thread-peer-row,
    .message-meta-row {
      display: flex;
      gap: 0.7rem;
      align-items: center;
      min-width: 0;
    }
    .message-meta-row { gap: 0.5rem; }
    .message-meta-text {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      align-items: center;
      min-width: 0;
    }
    .message-meta-name {
      color: var(--text);
      font-weight: 600;
    }
    .contact-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.6rem; }
    .retention-box, .group-panel { margin-top: 0.85rem; padding-top: 0.85rem; border-top: 1px solid var(--border); }
    .retention-row, .inline-form, .group-toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-top: 0.45rem; }
    .retention-row input { width: 180px; }
    .retention-unit { color: var(--muted); font-size: 0.88rem; }
    .file-preview { margin-top: 0.5rem; }
    .file-preview img { max-width: min(100%, 320px); border-radius: 8px; display: block; }
    .file-preview video { max-width: min(100%, 420px); border-radius: 8px; display: block; background: #000; }
    .file-link { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.03); color: var(--text); text-decoration: none; max-width: 100%; }
    .file-link .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    .send-status { margin-top: 0.6rem; padding: 0.5rem 0.7rem; border-radius: 8px; font-size: 0.85rem; }
    .send-status.info { background: rgba(88,166,255,0.10); color: var(--accent); }
    .send-status.err { background: rgba(248,81,73,0.10); color: var(--err); }
    .zoomable-image { cursor: zoom-in; }
    .lightbox { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 1.5rem; background: rgba(0,0,0,0.82); z-index: 9999; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: min(92vw, 1400px); max-height: 88vh; border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,0.45); }
    .lightbox-close { position: absolute; top: 1rem; right: 1rem; border: none; border-radius: 999px; width: 40px; height: 40px; cursor: pointer; background: rgba(255,255,255,0.12); color: #fff; font-size: 1.2rem; }
    .thread-title { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; }
    .thread-title h3 { margin: 0; font-size: 1.15rem; }
    .thread-subline { display: grid; gap: 0.3rem; margin-top: 0.45rem; }
    .member-list { display: grid; gap: 0.45rem; margin-top: 0.65rem; }
    .member-item { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; padding: 0.55rem 0.7rem; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,0.02); min-width: 0; }
    .member-main { display: grid; gap: 0.15rem; min-width: 0; }
    .member-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .pill-link { color: var(--accent); text-decoration: none; }
    .group-summary { margin-top: 0.55rem; color: var(--muted); font-size: 0.82rem; }
    .item-toolbar { display: flex; justify-content: space-between; gap: 0.5rem; align-items: center; }
    .segmented { display: inline-flex; padding: 0.2rem; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); gap: 0.2rem; }
    .seg-btn { border: none; background: transparent; color: var(--muted); border-radius: 999px; padding: 0.32rem 0.72rem; cursor: pointer; }
    .seg-btn.active { background: rgba(88,166,255,0.14); color: var(--text); }
    .thread-switch-list { display: grid; gap: 0.55rem; margin-top: 0.8rem; }
    .thread-mini { border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.8rem; background: rgba(255,255,255,0.02); cursor: pointer; transition: border-color 120ms ease, transform 120ms ease, background 120ms ease; min-width: 0; }
    .thread-mini:hover { transform: translateY(-1px); border-color: rgba(88,166,255,0.26); }
    .thread-mini.active { border-color: var(--accent); background: rgba(88,166,255,0.08); box-shadow: inset 0 0 0 1px rgba(88,166,255,0.14); }
    .thread-mini-top { display: flex; justify-content: space-between; gap: 0.75rem; align-items: flex-start; }
    .thread-mini-title { margin: 0; font-size: 0.94rem; }
    .thread-mini-meta { display: grid; gap: 0.22rem; min-width: 0; }
    .thread-mini-summary { margin-top: 0.55rem; color: var(--muted); font-size: 0.82rem; }
    .thread-mini-empty { margin-top: 0.7rem; }
    .section-note { color: var(--muted); font-size: 0.82rem; margin: 0.45rem 0 0.2rem; }
    .member-chip-row { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-top: 0.6rem; }
    .member-chip { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.6rem; border-radius: 999px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); font-size: 0.8rem; }
    .member-chip strong { font-weight: 600; }
    .member-actions { display: flex; gap: 0.45rem; flex-wrap: wrap; justify-content: flex-end; }
    .hint-box { margin-top: 0.8rem; padding: 0.7rem 0.8rem; border-radius: 10px; border: 1px solid rgba(88,166,255,0.18); background: rgba(88,166,255,0.08); color: var(--text); }
    .empty-state { display: grid; gap: 0.35rem; padding: 1rem 0.2rem; color: var(--muted); }
    .empty-state strong { color: var(--text); font-size: 0.94rem; }
    .composer-hint { margin-top: 0.6rem; color: var(--muted); font-size: 0.82rem; }
    .mobile-app-bar, .mobile-sheet-backdrop, .mobile-sheet-head { display: none; }
    .mobile-sheet-close { min-width: 88px; }
    @media (max-width: 1080px) {
      .shell { padding: 0.85rem; }
      .grid { grid-template-columns: 1fr; }
      .grid > .stack:first-child { order: 2; }
      .grid > .stack:last-child { order: 1; }
      .chat-layout { min-height: auto; }
      .messages { max-height: none; }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body { padding-bottom: env(safe-area-inset-bottom, 0); }
      .shell {
        width: 100vw;
        max-width: 100vw;
        margin: 0;
        padding: 0.6rem;
        overflow-x: clip;
      }
      .grid,
      .grid > .stack,
      #chat-card {
        width: 100%;
        max-width: 100%;
      }
      h1 { font-size: 1.15rem; margin-bottom: 0.75rem; }
      .card { padding: 0.8rem; border-radius: 10px; }
      .refresh-bar { display: none; }
      .mobile-app-bar {
        position: sticky;
        top: 0;
        z-index: 45;
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
        margin: 0 0 0.8rem;
        padding: 0.72rem 0.78rem;
        border: 1px solid rgba(88,166,255,0.18);
        border-radius: 12px;
        background: rgba(15,20,25,0.88);
        backdrop-filter: blur(14px);
        box-shadow: 0 10px 28px rgba(0,0,0,0.2);
      }
      .mobile-app-main {
        min-width: 0;
        display: grid;
        gap: 0.18rem;
      }
      .mobile-app-kicker {
        color: var(--muted);
        font-size: 0.73rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .mobile-app-thread {
        font-size: 0.96rem;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mobile-app-subline {
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mobile-app-actions {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }
      .mobile-app-actions .btn {
        padding: 0.46rem 0.72rem;
      }
      .message-revoke-btn {
        padding: 0.2rem 0.52rem;
        font-size: 0.72rem;
        min-height: 30px;
      }
      .mobile-app-actions .btn.active {
        background: rgba(88,166,255,0.16);
        border-color: rgba(88,166,255,0.3);
        color: var(--text);
      }
      .mobile-sheet-backdrop {
        position: fixed;
        inset: 0;
        z-index: 54;
        background: rgba(0,0,0,0.48);
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease;
      }
      body.mobile-panel-open .mobile-sheet-backdrop {
        display: block;
        opacity: 1;
        pointer-events: auto;
      }
      .mobile-sheet-head {
        position: sticky;
        top: 0;
        z-index: 3;
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
        margin: -0.1rem 0 0.8rem;
        padding: 0.25rem 0 0.8rem;
        background: linear-gradient(180deg, rgba(15,20,25,0.98), rgba(15,20,25,0.92) 72%, rgba(15,20,25,0));
        backdrop-filter: blur(10px);
      }
      .mobile-sheet-title {
        font-size: 0.95rem;
        font-weight: 600;
      }
      #utility-stack,
      #thread-stack {
        position: fixed;
        inset: 0;
        z-index: 60;
        padding: calc(0.65rem + env(safe-area-inset-top, 0px)) 0.6rem calc(1rem + env(safe-area-inset-bottom, 0px));
        background: rgba(15,20,25,0.96);
        overflow: auto;
        transform: translateY(110%);
        opacity: 0;
        pointer-events: none;
        transition: transform 180ms ease, opacity 140ms ease;
      }
      body.mobile-panel-tools #utility-stack,
      body.mobile-panel-threads #thread-stack {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      #chat-card {
        min-width: 0;
      }
      .refresh-bar,
      .thread-title,
      .item-toolbar,
      .thread-mini-top,
      .member-item,
      .contact-toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .kv { grid-template-columns: 92px 1fr; }
      .actions,
      .status-row,
      .member-actions,
      .member-chip-row {
        gap: 0.4rem;
      }
      .actions .btn,
      .member-actions .btn,
      .inline-form .btn,
      .retention-row .btn,
      .group-toolbar .btn {
        width: 100%;
      }
      .inline-form,
      .retention-row,
      .group-toolbar {
        align-items: stretch;
      }
      .inline-form > input,
      .inline-form > select,
      .retention-row > input,
      .group-toolbar > input,
      .group-toolbar > select {
        width: 100%;
      }
      .retention-row input { width: 100%; }
      .segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
      }
      .seg-btn {
        width: 100%;
        text-align: center;
      }
      .messages {
        gap: 0.55rem;
        padding-right: 0;
      }
      .message-row { gap: 0.45rem; }
      .message-stack { max-width: 86%; }
      .avatar-lg { width: 54px; height: 54px; }
      .avatar-md { width: 38px; height: 38px; }
      .avatar-sm { width: 30px; height: 30px; }
      .avatar-xs { width: 22px; height: 22px; }
      .bubble { padding: 0.72rem; }
      .bubble .meta { font-size: 0.74rem; }
      .composer {
        position: sticky;
        bottom: 0;
        padding-top: 0.8rem;
        background: linear-gradient(180deg, rgba(26,35,50,0), rgba(26,35,50,0.92) 18%, rgba(26,35,50,0.98));
        backdrop-filter: blur(8px);
      }
      .message-actions .btn {
        width: auto;
        flex: 0 0 auto;
      }
      .composer .actions {
        display: flex;
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-items: center;
      }
      .composer .actions .btn {
        width: auto;
        flex: 0 0 auto;
        font-weight: 700;
        letter-spacing: 0.01em;
        min-height: 38px;
        padding: 0.48rem 0.78rem;
        font-size: 0.82rem;
      }
      .composer .actions .btn-primary {
        background: #7cc0ff;
        color: #06111d;
        border: 1px solid rgba(124,192,255,0.75);
        box-shadow: 0 8px 18px rgba(88,166,255,0.22);
      }
      .composer .actions .btn-secondary {
        background: rgba(255,255,255,0.08);
        color: #f3f7fb;
        border-color: rgba(255,255,255,0.2);
      }
      .composer textarea { min-height: 88px; }
      .file-preview img,
      .file-preview video {
        max-width: 100%;
      }
      .file-link {
        width: 100%;
      }
      .file-link .name {
        max-width: none;
        min-width: 0;
      }
    }
    @media (max-width: 480px) {
      .shell { padding: 0.45rem; }
      .card { padding: 0.72rem; }
      .thread-mini,
      .item,
      .bubble,
      .member-item {
        border-radius: 9px;
      }
      .kv { grid-template-columns: 1fr; }
      .kv dt { margin-top: 0.3rem; }
      .thread-subline { gap: 0.22rem; }
      .message-stack { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>聊天</h1>
    <div id="global-msg"></div>
    <div class="refresh-bar">
      <div id="refresh-status" class="refresh-pill">自动刷新：初始化中…</div>
      <div id="refresh-hint"></div>
    </div>
    <div id="mobile-app-bar" class="mobile-app-bar"></div>
    <div id="mobile-sheet-backdrop" class="mobile-sheet-backdrop"></div>
    <div class="grid">
      <div class="stack" id="utility-stack">
        <div class="mobile-sheet-head">
          <div class="mobile-sheet-title">工具与联系人</div>
          <button type="button" class="btn btn-secondary mobile-sheet-close" data-close-mobile-panel>返回聊天</button>
        </div>
        <section class="card" id="profile-card"></section>
        <section class="card" id="network-card"></section>
        <section class="card" id="request-send-card"></section>
        <section class="card" id="group-create-card"></section>
        <section class="card" id="group-invite-card"></section>
        <section class="card" id="request-list-card"></section>
        <section class="card" id="contact-list-card"></section>
      </div>
      <div class="stack">
        <div class="stack" id="thread-stack">
          <div class="mobile-sheet-head">
            <div class="mobile-sheet-title">线程切换</div>
            <button type="button" class="btn btn-secondary mobile-sheet-close" data-close-mobile-panel>返回聊天</button>
          </div>
          <section class="card" id="thread-switcher-card"></section>
        </div>
        <section class="card chat-layout" id="chat-card">
          <div id="thread-header"></div>
          <div id="messages" class="messages"></div>
          <div id="composer" class="composer"></div>
        </section>
      </div>
    </div>
  </div>
  <div id="image-lightbox" class="lightbox" aria-hidden="true">
    <button type="button" class="lightbox-close" id="lightbox-close">×</button>
    <img id="lightbox-image" alt="">
  </div>
  <script>
    const state = {
      me: null,
      contacts: [],
      requests: [],
      conversations: [],
      groups: [],
      selectedConversationId: '',
      selectedGroupId: '',
      selectedThreadKind: '',
      messages: [],
      groupMessages: [],
      selectedGroupDetails: null,
      network: null,
      peerStatus: null,
      lastRefreshAt: null,
      previousRequestCount: 0,
      previousThreadCounts: {},
      threadFilter: 'all',
      knownGroupStates: {},
      directDrafts: {},
      groupDrafts: {},
      composerThreadKey: '',
      mobilePanel: '',
      contactNicknameDrafts: {},
      retentionDrafts: {},
      fileSendStatus: null,
      pendingFileUpload: null,
    };

    function api(path) { return path; }

    function get(path) {
      return fetch(api(path)).then(async r => {
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || r.statusText);
        return data;
      });
    }

    function post(path, body) {
      return fetch(api(path), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      }).then(async r => {
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || r.statusText);
        return data;
      });
    }

    function showMessage(kind, text) {
      document.getElementById('global-msg').innerHTML = '<div class="msg ' + kind + '">' + escapeHtml(text) + '</div>';
      setTimeout(() => {
        const el = document.getElementById('global-msg');
        if (el) el.innerHTML = '';
      }, 3000);
    }

    function escapeHtml(value) {
      if (value == null) return '';
      const div = document.createElement('div');
      div.textContent = value;
      return div.innerHTML;
    }

    function shortPeer(peerID) {
      if (!peerID) return '-';
      return peerID.length > 20 ? '…' + peerID.slice(-12) : peerID;
    }

    function displayName(peerID, fallback) {
      const contact = (state.contacts || []).find(c => c.peer_id === peerID);
      if (contact && contact.nickname) return contact.nickname;
      return fallback || shortPeer(peerID);
    }

    function avatarUrl(fileName) {
      if (!fileName) return '';
      return '/api/v1/chat/avatars/' + encodeURIComponent(fileName);
    }

    function avatarFallbackText(label, peerID) {
      const source = String(label || peerID || '').trim();
      if (!source) return '?';
      const chars = Array.from(source.replace(/\s+/g, '')).slice(0, 2);
      return chars.join('').toUpperCase() || '?';
    }

    function renderAvatar(fileName, label, sizeClass) {
      const fallback = escapeHtml(avatarFallbackText(label));
      const size = sizeClass || 'avatar-sm';
      if (!fileName) {
        return '<span class="avatar ' + size + '"><span class="avatar-fallback">' + fallback + '</span></span>';
      }
      return '<span class="avatar ' + size + ' has-image">' +
        '<img data-avatar-img src="' + escapeHtml(avatarUrl(fileName)) + '" alt="' + escapeHtml(String(label || 'avatar')) + '">' +
        '<span class="avatar-fallback">' + fallback + '</span>' +
      '</span>';
    }

    function bindAvatarImages() {
      document.querySelectorAll('img[data-avatar-img]').forEach(img => {
        if (img.dataset.avatarBound === '1') return;
        img.dataset.avatarBound = '1';
        img.onerror = () => {
          const box = img.closest('.avatar');
          if (box) {
            box.classList.remove('has-image');
            box.classList.add('avatar-broken');
          }
          img.remove();
        };
      });
    }

    function peerAvatar(peerID) {
      if (!peerID) return '';
      if (state.me && peerID === state.me.peer_id) {
        return state.me.avatar || '';
      }
      const contact = (state.contacts || []).find(c => c.peer_id === peerID);
      return (contact && contact.avatar) || '';
    }

    function requestAvatar(req) {
      if (!req) return '';
      const remotePeerID = req.to_peer_id === state.me?.peer_id ? req.from_peer_id : req.to_peer_id;
      const contact = (state.contacts || []).find(c => c.peer_id === remotePeerID);
      return req.avatar || (contact && contact.avatar) || '';
    }

    function formatTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.valueOf())) return '-';
      return d.toLocaleString();
    }

    function threadKey(kind, id) {
      return kind && id ? kind + ':' + id : '';
    }

    function currentThreadKey() {
      return state.selectedThreadKind === 'group'
        ? threadKey('group', state.selectedGroupId)
        : state.selectedThreadKind === 'direct'
          ? threadKey('direct', state.selectedConversationId)
          : '';
    }

    function isCompactMobileViewport() {
      return window.matchMedia('(max-width: 720px)').matches;
    }

    function currentThreadSummary() {
      const direct = state.selectedThreadKind === 'direct' ? getSelectedConversation() : null;
      const group = state.selectedThreadKind === 'group' ? getSelectedGroup() : null;
      if (direct) {
        return {
          title: displayName(direct.peer_id, shortPeer(direct.peer_id)),
          subtitle: '单聊 · ' + shortPeer(direct.peer_id)
        };
      }
      if (group) {
        return {
          title: group.title || '未命名群',
          subtitle: '群聊 · ' + groupMemberStateLabel(group.local_member_state || '') + ' · ' + shortPeer(group.group_id)
        };
      }
      return {
        title: '还没有选中线程',
        subtitle: '打开线程列表开始聊天'
      };
    }

    function applyMobilePanelState() {
      const body = document.body;
      if (!body) return;
      if (!isCompactMobileViewport()) {
        state.mobilePanel = '';
      }
      body.classList.toggle('mobile-panel-open', !!state.mobilePanel);
      body.classList.toggle('mobile-panel-tools', state.mobilePanel === 'tools');
      body.classList.toggle('mobile-panel-threads', state.mobilePanel === 'threads');
    }

    function openMobilePanel(panel) {
      state.mobilePanel = panel || '';
      applyMobilePanelState();
      renderMobileAppBar();
    }

    function closeMobilePanel() {
      if (!state.mobilePanel) return;
      state.mobilePanel = '';
      applyMobilePanelState();
      renderMobileAppBar();
    }

    function renderMobileAppBar() {
      const bar = document.getElementById('mobile-app-bar');
      if (!bar) return;
      const summary = currentThreadSummary();
      bar.innerHTML =
        '<div class="mobile-app-main">' +
          '<div class="mobile-app-kicker">meshproxy chat</div>' +
          '<div class="mobile-app-thread">' + escapeHtml(summary.title) + '</div>' +
          '<div class="mobile-app-subline">' + escapeHtml(summary.subtitle) + '</div>' +
        '</div>' +
        '<div class="mobile-app-actions">' +
          '<button type="button" class="btn btn-secondary' + (state.mobilePanel === 'threads' ? ' active' : '') + '" data-open-mobile-panel="threads">' + escapeHtml(state.mobilePanel === 'threads' ? '关闭线程' : '线程') + '</button>' +
          '<button type="button" class="btn btn-secondary' + (state.mobilePanel === 'tools' ? ' active' : '') + '" data-open-mobile-panel="tools">' + escapeHtml(state.mobilePanel === 'tools' ? '关闭工具' : '工具') + '</button>' +
        '</div>';
      document.querySelectorAll('[data-open-mobile-panel]').forEach(btn => {
        btn.onclick = () => {
          const panel = btn.dataset.openMobilePanel || '';
          if (state.mobilePanel === panel) {
            closeMobilePanel();
          } else {
            openMobilePanel(panel);
          }
        };
      });
      document.querySelectorAll('[data-close-mobile-panel]').forEach(btn => {
        btn.onclick = () => closeMobilePanel();
      });
    }

    function getSelectedConversation() {
      return (state.conversations || []).find(c => c.conversation_id === state.selectedConversationId) || null;
    }

    function getSelectedGroup() {
      return (state.groups || []).find(g => g.group_id === state.selectedGroupId) || null;
    }

    function getGroupDetails() {
      return state.selectedGroupDetails;
    }

    function getLocalGroupMember(details) {
      if (!details || !details.members || !state.me) return null;
      return details.members.find(member => member.peer_id === state.me.peer_id) || null;
    }

    function getGroupMember(details, peerID) {
      if (!details || !details.members || !peerID) return null;
      return details.members.find(member => member.peer_id === peerID) || null;
    }

    function groupDraft(groupID) {
      if (!state.groupDrafts[groupID]) {
        state.groupDrafts[groupID] = {
          title: '',
          invitePeerId: '',
          inviteRole: 'member',
          transferPeerId: '',
          syncPeerId: '',
          retentionMinutes: ''
        };
      }
      return state.groupDrafts[groupID];
    }

    function parsePeerList(input) {
      return String(input || '')
        .split(/[\s,]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function timeValue(value) {
      if (!value) return 0;
      const d = new Date(value);
      return Number.isNaN(d.valueOf()) ? 0 : d.valueOf();
    }

    function relativeTime(value) {
      const stamp = timeValue(value);
      if (!stamp) return '-';
      const diff = Date.now() - stamp;
      const abs = Math.abs(diff);
      if (abs < 60 * 1000) return diff >= 0 ? '刚刚' : '即将';
      if (abs < 60 * 60 * 1000) return Math.round(abs / (60 * 1000)) + ' 分钟' + (diff >= 0 ? '前' : '后');
      if (abs < 24 * 60 * 60 * 1000) return Math.round(abs / (60 * 60 * 1000)) + ' 小时' + (diff >= 0 ? '前' : '后');
      return Math.round(abs / (24 * 60 * 60 * 1000)) + ' 天' + (diff >= 0 ? '前' : '后');
    }

    function groupStateLabel(value) {
      if (value === 'active') return '运行中';
      if (value === 'archived') return '已归档';
      return value || '-';
    }

    function groupMemberStateLabel(value) {
      if (value === 'active') return '已加入';
      if (value === 'invited') return '待加入';
      if (value === 'left') return '已退出';
      if (value === 'removed') return '已移除';
      return value || '-';
    }

    function groupRoleLabel(value) {
      if (value === 'controller') return 'controller';
      if (value === 'admin') return 'admin';
      if (value === 'member') return 'member';
      return value || '-';
    }

    function groupArrivalBadge(group) {
      if (!group) return '';
      if (group.local_member_state === 'invited') return '待加入';
      if (group.local_member_state === 'active') return '已加入';
      if (group.local_member_state === 'left') return '已退出';
      if (group.local_member_state === 'removed') return '已移除';
      return '';
    }

    function groupMemberStats(details) {
      const stats = { total: 0, active: 0, invited: 0, left: 0, removed: 0 };
      const members = (details && details.members) || [];
      members.forEach(member => {
        stats.total += 1;
        if (member.state === 'active') stats.active += 1;
        else if (member.state === 'invited') stats.invited += 1;
        else if (member.state === 'left') stats.left += 1;
        else if (member.state === 'removed') stats.removed += 1;
      });
      return stats;
    }

    function buildThreadItems() {
      const directItems = (state.conversations || []).map(conv => ({
        kind: 'direct',
        id: conv.conversation_id,
        title: displayName(conv.peer_id, shortPeer(conv.peer_id)),
        subtitle: shortPeer(conv.peer_id),
        stamp: timeValue(conv.updated_at),
        badge: conv.last_transport_mode || 'offline',
        summary: '最近更新 ' + relativeTime(conv.updated_at)
      }));
      const groupItems = (state.groups || []).map(group => ({
        kind: 'group',
        id: group.group_id,
        title: group.title || '未命名群',
        subtitle: shortPeer(group.group_id),
        stamp: Math.max(timeValue(group.last_message_at), timeValue(group.updated_at)),
        badge: group.state || '-',
        summary: (groupArrivalBadge(group) ? (groupArrivalBadge(group) + ' · ') : '') + (group.last_message_at ? '最近消息 ' + relativeTime(group.last_message_at) : '最近更新 ' + relativeTime(group.updated_at)) + ' · 成员 ' + (group.member_count || 0)
      }));
      return directItems.concat(groupItems).sort((a, b) => b.stamp - a.stamp);
    }

    function reconcileThreadSelection() {
      const hasDirect = state.selectedConversationId && state.conversations.some(c => c.conversation_id === state.selectedConversationId);
      const hasGroup = state.selectedGroupId && state.groups.some(g => g.group_id === state.selectedGroupId);
      if (state.selectedThreadKind === 'direct' && hasDirect) return;
      if (state.selectedThreadKind === 'group' && hasGroup) return;
      if (hasDirect) {
        state.selectedThreadKind = 'direct';
        return;
      }
      if (hasGroup) {
        state.selectedThreadKind = 'group';
        return;
      }
      if (state.conversations.length) {
        state.selectedThreadKind = 'direct';
        state.selectedConversationId = state.conversations[0].conversation_id;
        state.selectedGroupId = '';
        return;
      }
      if (state.groups.length) {
        state.selectedThreadKind = 'group';
        state.selectedGroupId = state.groups[0].group_id;
        state.selectedConversationId = '';
        return;
      }
      state.selectedThreadKind = '';
      state.selectedConversationId = '';
      state.selectedGroupId = '';
    }

    function selectConversation(conversationID) {
      state.selectedThreadKind = 'direct';
      state.selectedConversationId = conversationID;
      state.selectedGroupId = '';
      state.selectedGroupDetails = null;
      state.fileSendStatus = null;
      closeMobilePanel();
    }

    function selectGroup(groupID) {
      state.selectedThreadKind = 'group';
      state.selectedGroupId = groupID;
      state.selectedConversationId = '';
      state.peerStatus = null;
      state.fileSendStatus = null;
      closeMobilePanel();
    }

    function threadMessageStateBadge(msgState) {
      if (msgState === 'delivered_remote') return '<span class="badge msg-delivered">已送达</span>';
      if (msgState === 'sent_to_transport') return '<span class="badge msg-sent">已发送</span>';
      if (msgState === 'received') return '<span class="badge msg-delivered">已接收</span>';
      if (msgState === 'queued_for_retry') return '<span class="badge msg-retry">重试中</span>';
      if (msgState === 'partially_sent') return '<span class="badge msg-retry">部分已发</span>';
      if (msgState === 'partially_delivered') return '<span class="badge msg-retry">部分送达</span>';
      if (msgState === 'failed_partial' || msgState === 'failed') return '<span class="badge msg-failed">部分失败</span>';
      return '<span class="badge msg-local">' + escapeHtml(msgState || '本地') + '</span>';
    }

    function isDirectImageMessage(msg) {
      return msg && msg.msg_type === 'chat_file' && /^image\//.test(msg.mime_type || '');
    }

    function isDirectVideoMessage(msg) {
      return msg && msg.msg_type === 'chat_file' && /^video\//.test(msg.mime_type || '');
    }

    function isGroupImageMessage(msg) {
      return msg && msg.msg_type === 'group_chat_file' && /^image\//.test(msg.mime_type || '');
    }

    function isGroupVideoMessage(msg) {
      return msg && msg.msg_type === 'group_chat_file' && /^video\//.test(msg.mime_type || '');
    }

    function directFileUrl(msg) {
      return '/api/v1/chat/conversations/' + encodeURIComponent(msg.conversation_id) + '/messages/' + encodeURIComponent(msg.msg_id) + '/file';
    }

    function groupFileUrl(msg) {
      return '/api/v1/groups/' + encodeURIComponent(msg.group_id) + '/messages/' + encodeURIComponent(msg.msg_id) + '/file';
    }

    function renderDirectMessageBody(msg) {
      if (msg && msg.msg_type === 'group_invite_notice') {
        let payload = null;
        try {
          payload = JSON.parse(msg.plaintext || '{}');
        } catch (_) {}
        const groupID = payload && payload.group_id ? payload.group_id : '';
        const title = payload && payload.title ? payload.title : '未命名群';
        const inviteText = payload && payload.invite_text ? payload.invite_text : '';
        return '<div class="file-preview">' +
          '<div><strong>群聊邀请</strong></div>' +
          '<div class="muted">群：' + escapeHtml(title) + '</div>' +
          (inviteText ? '<div class="muted">附言：' + escapeHtml(inviteText) + '</div>' : '') +
          (groupID ? '<div class="actions" style="margin-top:0.55rem"><button type="button" class="btn btn-secondary" data-open-group-from-direct="' + escapeHtml(groupID) + '">打开群聊</button><button type="button" class="btn btn-primary" data-join-group-from-direct="' + escapeHtml(groupID) + '">加入群聊</button></div>' : '') +
        '</div>';
      }
      if (!msg || msg.msg_type !== 'chat_file') {
        return '<div>' + escapeHtml(msg.plaintext || '') + '</div>';
      }
      const url = directFileUrl(msg);
      const fileName = escapeHtml(msg.file_name || 'file');
      if (isDirectImageMessage(msg)) {
        return '<div class="file-preview"><img class="zoomable-image" data-preview-src="' + url + '" data-preview-name="' + fileName + '" src="' + url + '" alt="' + fileName + '"></div>';
      }
      if (isDirectVideoMessage(msg)) {
        return '<div class="file-preview"><video src="' + url + '" controls autoplay muted playsinline preload="metadata"></video></div>';
      }
      return '<div class="file-preview"><a class="file-link" href="' + url + '" download="' + fileName + '"><span>文件</span><span class="name">' + fileName + '</span></a></div>';
    }

    function renderGroupMessageBody(msg) {
      if (!msg || msg.msg_type !== 'group_chat_file') {
        return '<div>' + escapeHtml(msg.plaintext || '') + '</div>';
      }
      const url = groupFileUrl(msg);
      const fileName = escapeHtml(msg.file_name || 'file');
      if (isGroupImageMessage(msg)) {
        return '<div class="file-preview"><img class="zoomable-image" data-preview-src="' + url + '" data-preview-name="' + fileName + '" src="' + url + '" alt="' + fileName + '"></div>';
      }
      if (isGroupVideoMessage(msg)) {
        return '<div class="file-preview"><video src="' + url + '" controls autoplay muted playsinline preload="metadata"></video></div>';
      }
      return '<div class="file-preview"><a class="file-link" href="' + url + '" download="' + fileName + '"><span>文件</span><span class="name">' + fileName + '</span></a></div>';
    }

    function canRevokeGroupMessage(msg, group, details) {
      if (!msg || !group || group.state !== 'active') return false;
      const localMember = getLocalGroupMember(details);
      if (!localMember || localMember.state !== 'active') return false;
      if (msg.sender_peer_id === (state.me && state.me.peer_id)) return true;
      if (localMember.role === 'controller') return true;
      if (localMember.role !== 'admin') return false;
      const senderMember = getGroupMember(details, msg.sender_peer_id);
      return !senderMember || senderMember.role !== 'controller';
    }

    function fileExtForMime(mimeType) {
      if (!mimeType) return 'bin';
      if (mimeType === 'image/png') return 'png';
      if (mimeType === 'image/jpeg') return 'jpg';
      if (mimeType === 'image/webp') return 'webp';
      if (mimeType === 'image/gif') return 'gif';
      return 'bin';
    }

    async function handleComposerPaste(e) {
      const clipboard = e.clipboardData;
      if (!clipboard || !clipboard.items || !clipboard.items.length) return;
      const imageItem = Array.from(clipboard.items).find(item => item.kind === 'file' && /^image\//.test(item.type || ''));
      if (!imageItem) return;
      const blob = imageItem.getAsFile();
      if (!blob) return;
      e.preventDefault();
      const ext = fileExtForMime(blob.type);
      const file = new File([blob], 'pasted-image-' + Date.now() + '.' + ext, { type: blob.type || 'application/octet-stream' });
      await sendFileForCurrentThread(file);
    }

    function renderRefreshStatus() {
      const statusEl = document.getElementById('refresh-status');
      const hintEl = document.getElementById('refresh-hint');
      if (statusEl) {
        statusEl.textContent = '自动刷新：' + (state.lastRefreshAt ? formatTime(state.lastRefreshAt) : '尚未完成');
      }
      if (hintEl && !hintEl.textContent) {
        hintEl.textContent = '每 5 秒同步请求、联系人、单聊与群聊';
      }
    }

    function flashRefreshHint(text) {
      const hintEl = document.getElementById('refresh-hint');
      if (!hintEl) return;
      hintEl.textContent = text;
      setTimeout(() => {
        if (hintEl.textContent === text) {
          hintEl.textContent = '每 5 秒同步请求、联系人、单聊与群聊';
        }
      }, 3000);
    }

    function setFileSendStatus(status) {
      state.fileSendStatus = status;
      const node = document.getElementById('composer-send-status');
      if (!node) return;
      const currentKey = currentThreadKey();
      if (!status || status.threadKey !== currentKey) {
        node.innerHTML = '';
        return;
      }
      node.innerHTML = '<div class="send-status ' + escapeHtml(status.kind || 'info') + '">' + escapeHtml(status.text || '') + (status.retry ? ' <button type="button" class="btn btn-secondary" id="retry-file-send-btn">重试发送</button>' : '') + '</div>';
      const retryBtn = document.getElementById('retry-file-send-btn');
      if (retryBtn) {
        retryBtn.onclick = async () => {
          const job = state.pendingFileUpload;
          if (!job) return;
          await sendFileForThread(job.kind, job.targetId, job.file);
        };
      }
    }

    async function sendFileForThread(kind, targetId, file) {
      if (!file) return;
      const key = threadKey(kind, targetId);
      state.pendingFileUpload = { kind, targetId, file };
      setFileSendStatus({ kind: 'info', text: '准备上传：' + file.name, threadKey: key });
      const form = new FormData();
      form.append('file', file);
      const path = kind === 'group'
        ? '/api/v1/groups/' + encodeURIComponent(targetId) + '/files'
        : '/api/v1/chat/conversations/' + encodeURIComponent(targetId) + '/files';
      try {
        setFileSendStatus({ kind: 'info', text: '上传中：' + file.name, threadKey: key });
        const resp = await fetch(path, { method: 'POST', body: form });
        setFileSendStatus({ kind: 'info', text: '发送中：' + file.name, threadKey: key });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || resp.statusText);
        showMessage('ok', '文件已发送');
        state.pendingFileUpload = null;
        setFileSendStatus(null);
        const fileInput = document.getElementById('composer-file');
        if (fileInput) fileInput.value = '';
        await refreshCurrentThread();
        await refreshConversations();
        await refreshGroups();
        renderThreadLists();
      } catch (err) {
        setFileSendStatus({ kind: 'err', text: '发送文件失败：' + err.message, retry: true, threadKey: key });
        showMessage('err', '发送文件失败: ' + err.message);
      }
    }

    async function sendFileForCurrentThread(file) {
      if (state.selectedThreadKind === 'group' && state.selectedGroupId) {
        return sendFileForThread('group', state.selectedGroupId, file);
      }
      if (state.selectedThreadKind === 'direct' && state.selectedConversationId) {
        return sendFileForThread('direct', state.selectedConversationId, file);
      }
    }

      }
    }

    function renderGroupDeliverySummary(summary) {
      if (!summary || typeof summary.total !== 'number' || summary.total <= 0) return '';
      const parts = [];
      if (summary.delivered_remote) parts.push('送达 ' + summary.delivered_remote);
      if (summary.sent_to_transport) parts.push('已发出 ' + summary.sent_to_transport);
      if (summary.queued_for_retry) parts.push('重试 ' + summary.queued_for_retry);
      if (summary.failed) parts.push('失败 ' + summary.failed);
      if (!parts.length) parts.push('目标 ' + summary.total);
      const badgeClass = summary.failed ? 'msg-failed' : summary.queued_for_retry ? 'msg-retry' : summary.delivered_remote === summary.total ? 'msg-delivered' : 'warn';
      return '<span class="badge ' + escapeHtml(badgeClass) + '">' + escapeHtml(parts.join(' · ')) + '</span>';
    }

    function parseEventPayload(payloadJSON) {
      if (!payloadJSON) return null;
      try {
        return JSON.parse(payloadJSON);
      } catch (_) {
        return null;
      }
    }

    function renderGroupEventDeliverySummary(summary) {
      if (!summary || typeof summary.total !== 'number' || summary.total <= 0) return '<span class="badge msg-local">仅本地记录</span>';
      const parts = [];
      if (summary.sent_to_transport) parts.push('已发出 ' + summary.sent_to_transport);
      if (summary.queued_for_retry) parts.push('重试 ' + summary.queued_for_retry);
      if (summary.failed) parts.push('失败 ' + summary.failed);
      if (!parts.length) parts.push('目标 ' + summary.total);
      const badgeClass = summary.failed ? 'msg-failed' : summary.queued_for_retry ? 'msg-retry' : 'msg-sent';
      return '<span class="badge ' + escapeHtml(badgeClass) + '">' + escapeHtml(parts.join(' · ')) + '</span>';
    }

    function describeGroupEvent(event) {
      const payload = parseEventPayload(event && event.payload_json);
      if (!event) return '未知事件';
      if (event.event_type === 'group_invite') {
        return '邀请 ' + displayName(payload && payload.invitee_peer_id, shortPeer(payload && payload.invitee_peer_id));
      }
      if (event.event_type === 'group_join') {
        return displayName(payload && payload.joiner_peer_id, shortPeer(payload && payload.joiner_peer_id)) + ' 加入群聊';
      }
      if (event.event_type === 'group_leave') {
        return displayName(payload && payload.leaver_peer_id, shortPeer(payload && payload.leaver_peer_id)) + ' 退出群聊';
      }
      if (event.event_type === 'group_remove') {
        return '移除 ' + displayName(payload && payload.target_peer_id, shortPeer(payload && payload.target_peer_id));
      }
      if (event.event_type === 'group_title_update') {
        return '修改群标题为“' + ((payload && payload.title) || '') + '”';
      }
      if (event.event_type === 'group_retention_update') {
        return '将自动删除时间设置为 ' + (((payload && payload.retention_minutes) || 0) > 0 ? ((payload && payload.retention_minutes) + ' 分钟') : '关闭');
      }
      if (event.event_type === 'group_controller_transfer') {
        return 'controller 转移给 ' + displayName(payload && payload.to_peer_id, shortPeer(payload && payload.to_peer_id));
      }
      if (event.event_type === 'group_create') {
        return '创建群聊';
      }
      return event.event_type || '未知事件';
    }

    function renderThreadMessages() {
      const wrap = document.getElementById('messages');
      if (!wrap) return;
      const direct = state.selectedThreadKind === 'direct' ? getSelectedConversation() : null;
      const group = state.selectedThreadKind === 'group' ? getSelectedGroup() : null;
      if (!direct && !group) {
        wrap.innerHTML = '<p class="empty">未选择会话</p>';
        return;
      }
      if (direct) {
        if (!(state.messages || []).length) {
          wrap.innerHTML = '<div class="empty-state"><strong>这段单聊还没有消息</strong><div>发一条文字或文件，消息会根据 direct / relay 状态自动尝试发送。</div></div>';
        } else {
          wrap.innerHTML = state.messages.map(msg => {
            const canRevoke = msg.direction === 'outbound'
              && msg.sender_peer_id === state.me?.peer_id
              && (msg.msg_type === 'chat_text' || msg.msg_type === 'chat_file');
            const senderName = msg.direction === 'outbound' ? '我' : displayName(msg.sender_peer_id, shortPeer(msg.sender_peer_id));
            const senderAvatarName = peerAvatar(msg.sender_peer_id);
            return '<div class="message-row ' + escapeHtml(msg.direction === 'outbound' ? 'outbound' : 'inbound') + '">' +
              '<div class="message-avatar">' + renderAvatar(senderAvatarName, senderName, 'avatar-lg') + '</div>' +
              '<div class="message-stack">' +
                '<div class="bubble ' + escapeHtml(msg.direction === 'outbound' ? 'outbound' : 'inbound') + '">' +
                  '<div class="meta">' +
                    '<div class="message-meta-row">' +
                      '<div class="message-meta-text">' +
                        '<span class="message-meta-name">' + escapeHtml(senderName) + '</span>' +
                        threadMessageStateBadge(msg.state) +
                        '<span class="muted">' + escapeHtml(formatTime(msg.created_at)) + '</span>' +
                      '</div>' +
                    '</div>' +
                  '</div>' +
                  renderDirectMessageBody(msg) +
                '</div>' +
                (canRevoke
                  ? '<div class="actions message-actions"><button type="button" class="btn btn-danger message-revoke-btn" data-revoke-msg="' + escapeHtml(msg.msg_id) + '">撤回</button></div>'
                  : '') +
              '</div>' +
            '</div>';
          }).join('');
        }
        document.querySelectorAll('[data-revoke-msg]').forEach(btn => {
          btn.onclick = async () => {
            if (!direct) return;
            if (!window.confirm('确认撤回这条消息吗？撤回后双方都会删除这条消息。')) return;
            try {
              await post('/api/v1/chat/conversations/' + encodeURIComponent(direct.conversation_id) + '/messages/' + encodeURIComponent(btn.dataset.revokeMsg) + '/revoke');
              showMessage('ok', '消息已撤回');
              await refreshCurrentThread();
              await refreshConversations();
              renderThreadLists();
            } catch (err) {
              showMessage('err', '撤回失败: ' + err.message);
            }
          };
        });
        document.querySelectorAll('[data-open-group-from-direct]').forEach(btn => {
          btn.onclick = async () => {
            selectGroup(btn.dataset.openGroupFromDirect);
            renderThreadLists();
            await refreshCurrentThread();
          };
        });
        document.querySelectorAll('[data-join-group-from-direct]').forEach(btn => {
          btn.onclick = async () => {
            try {
              await post('/api/v1/groups/' + encodeURIComponent(btn.dataset.joinGroupFromDirect) + '/join');
              showMessage('ok', '已加入群聊');
              await refreshGroups();
              renderThreadLists();
              await refreshCurrentThread();
            } catch (err) {
              showMessage('err', '加入群聊失败: ' + err.message);
            }
          };
        });
      } else if (group) {
        const groupDetails = getGroupDetails();
        const localGroupMember = getLocalGroupMember(groupDetails);
        if (!(state.groupMessages || []).length) {
          wrap.innerHTML = localGroupMember && localGroupMember.state === 'invited'
            ? '<div class="empty-state"><strong>你还在等待加入这个群</strong><div>先点击上方“加入群聊”，加入后才能稳定发送和接收群消息。</div></div>'
            : '<div class="empty-state"><strong>这个群聊还没有消息</strong><div>可以先发一条文本或文件，系统会按群成员逐个 fanout 并统计投递状态。</div></div>';
        } else {
          wrap.innerHTML = state.groupMessages.map(msg => {
            const outbound = msg.sender_peer_id === state.me?.peer_id;
            const senderName = outbound ? '我' : displayName(msg.sender_peer_id, shortPeer(msg.sender_peer_id));
            const senderAvatarName = peerAvatar(msg.sender_peer_id);
            const canRevoke = canRevokeGroupMessage(msg, group, groupDetails);
            return '<div class="message-row ' + escapeHtml(outbound ? 'outbound' : 'inbound') + '">' +
              '<div class="message-avatar">' + renderAvatar(senderAvatarName, senderName, 'avatar-lg') + '</div>' +
              '<div class="message-stack">' +
                '<div class="bubble ' + escapeHtml(outbound ? 'outbound' : 'inbound') + '">' +
                  '<div class="meta">' +
                    '<div class="message-meta-row">' +
                      '<div class="message-meta-text">' +
                        '<span class="message-meta-name">' + escapeHtml(senderName) + '</span>' +
                        threadMessageStateBadge(msg.state) +
                        renderGroupDeliverySummary(msg.delivery_summary) +
                        '<span class="muted">' + escapeHtml(formatTime(msg.created_at)) + '</span>' +
                      '</div>' +
                    '</div>' +
                  '</div>' +
                  renderGroupMessageBody(msg) +
                '</div>' +
                (canRevoke
                  ? '<div class="actions message-actions"><button type="button" class="btn btn-danger message-revoke-btn" data-group-revoke-msg="' + escapeHtml(msg.msg_id) + '">撤回</button></div>'
                  : '') +
              '</div>' +
            '</div>';
          }).join('');
        }
      }
      document.querySelectorAll('[data-group-revoke-msg]').forEach(btn => {
        btn.onclick = async () => {
          if (!group) return;
          if (!window.confirm('确认撤回这条群消息吗？撤回后群成员都会删除这条消息。')) return;
          try {
            await post('/api/v1/groups/' + encodeURIComponent(group.group_id) + '/messages/' + encodeURIComponent(btn.dataset.groupRevokeMsg) + '/revoke');
            showMessage('ok', '群消息已撤回');
            await refreshCurrentThread();
            await refreshGroups();
            renderThreadLists();
          } catch (err) {
            showMessage('err', '群消息撤回失败: ' + err.message);
          }
        };
      });
      document.querySelectorAll('[data-preview-src]').forEach(img => {
        img.onclick = () => openImageLightbox(img.dataset.previewSrc, img.dataset.previewName || '');
      });
      bindAvatarImages();
    }

    function renderComposer() {
      const composer = document.getElementById('composer');
      if (!composer) return;
      const direct = state.selectedThreadKind === 'direct' ? getSelectedConversation() : null;
      const group = state.selectedThreadKind === 'group' ? getSelectedGroup() : null;
      const groupDetails = getGroupDetails();
      const localGroupMember = getLocalGroupMember(groupDetails);
      if (!direct && !group) {
        composer.innerHTML = '';
        state.composerThreadKey = '';
        return;
      }

      if (direct) {
        const draftKey = threadKey('direct', direct.conversation_id);
        const draft = state.directDrafts[direct.conversation_id] || '';
        const shouldRebuild = state.composerThreadKey !== draftKey || !document.getElementById('composer-text');
        if (shouldRebuild) {
          composer.innerHTML =
            '<div class="form-row"><label>发送消息</label><textarea id="composer-text" placeholder="输入消息内容"></textarea></div>' +
            '<input id="composer-file" type="file" hidden>' +
            '<div class="actions"><button class="btn btn-primary" id="send-message-btn">发送</button><button type="button" class="btn btn-secondary" id="send-file-btn">发送文件</button></div>' +
            '<div id="composer-send-status"></div>';
          state.composerThreadKey = draftKey;
        }
        const input = document.getElementById('composer-text');
        if (input) {
          if (input.value !== draft && document.activeElement !== input) {
            input.value = draft;
          }
          if (shouldRebuild) {
            input.addEventListener('input', () => {
              state.directDrafts[direct.conversation_id] = input.value;
            });
            input.addEventListener('paste', async (e) => {
              try {
                await handleComposerPaste(e);
              } catch (err) {
                showMessage('err', '粘贴图片发送失败: ' + err.message);
              }
            });
          }
        }
        if (shouldRebuild) {
          document.getElementById('send-message-btn').onclick = async () => {
            const text = (document.getElementById('composer-text')?.value || '').trim();
            if (!text) return;
            try {
              await post('/api/v1/chat/conversations/' + encodeURIComponent(direct.conversation_id) + '/messages', { text });
              state.directDrafts[direct.conversation_id] = '';
              await refreshCurrentThread();
              await refreshConversations();
              renderThreadLists();
            } catch (err) {
              showMessage('err', '发送失败: ' + err.message);
            }
          };
        }
        const fileBtn = document.getElementById('send-file-btn');
        const fileInput = document.getElementById('composer-file');
        if (shouldRebuild && fileBtn && fileInput) {
          fileBtn.onclick = () => fileInput.click();
          fileInput.onchange = async () => {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;
            await sendFileForThread('direct', direct.conversation_id, file);
          };
        }
        setFileSendStatus(state.fileSendStatus);
        return;
      }

      if (!group || !localGroupMember) {
        composer.innerHTML = '<p class="empty">当前群聊状态不可发送消息</p>';
        state.composerThreadKey = '';
        return;
      }
      if (localGroupMember.state !== 'active') {
        composer.innerHTML = '<p class="empty">当前成员状态为 ' + escapeHtml(localGroupMember.state) + '，暂不能发送群消息。</p>';
        state.composerThreadKey = '';
        return;
      }
      const draftKey = threadKey('group', group.group_id);
      const draft = groupDraft(group.group_id).message || '';
      const shouldRebuild = state.composerThreadKey !== draftKey || !document.getElementById('composer-text');
      if (shouldRebuild) {
        composer.innerHTML =
          '<div class="form-row"><label>发送群消息</label><textarea id="composer-text" placeholder="输入群消息内容"></textarea></div>' +
          '<input id="composer-file" type="file" hidden>' +
          '<div class="actions"><button class="btn btn-primary" id="send-message-btn">发送到群</button><button type="button" class="btn btn-secondary" id="send-file-btn">发送群文件</button></div>' +
          '<div class="composer-hint">当前 epoch ' + escapeHtml(String(group.current_epoch || 0)) + ' · active 成员会收到 fanout 投递，离线成员可在后续补同步时拉取。</div>' +
          '<div id="composer-send-status"></div>';
        state.composerThreadKey = draftKey;
      }
      const input = document.getElementById('composer-text');
      if (input) {
        if (input.value !== draft && document.activeElement !== input) {
          input.value = draft;
        }
        if (shouldRebuild) {
          input.addEventListener('input', () => {
            groupDraft(group.group_id).message = input.value;
          });
          input.addEventListener('paste', async (e) => {
            try {
              await handleComposerPaste(e);
            } catch (err) {
              showMessage('err', '粘贴图片发送失败: ' + err.message);
            }
          });
        }
      }
      if (shouldRebuild) {
        document.getElementById('send-message-btn').onclick = async () => {
          const text = (document.getElementById('composer-text')?.value || '').trim();
          if (!text) return;
          try {
            await post('/api/v1/groups/' + encodeURIComponent(group.group_id) + '/messages', { text });
            groupDraft(group.group_id).message = '';
            await refreshCurrentThread();
            await refreshGroups();
            renderThreadLists();
          } catch (err) {
            showMessage('err', '发送群消息失败: ' + err.message);
          }
        };
      }
      const fileBtn = document.getElementById('send-file-btn');
      const fileInput = document.getElementById('composer-file');
      if (shouldRebuild && fileBtn && fileInput) {
        fileBtn.onclick = () => fileInput.click();
        fileInput.onchange = async () => {
          const file = fileInput.files && fileInput.files[0];
          if (!file) return;
          await sendFileForThread('group', group.group_id, file);
        };
      }
      setFileSendStatus(state.fileSendStatus);
    }

    async function refreshProfile() {
      state.me = await get('/api/v1/chat/me');
      renderProfile();
    }

    async function refreshNetwork() {
      state.network = await get('/api/v1/chat/network/status');
      renderNetwork();
    }

    async function refreshRequests() {
      const prev = Array.isArray(state.requests) ? state.requests.length : 0;
      state.requests = await get('/api/v1/chat/requests');
      if (!Array.isArray(state.requests)) state.requests = [];
      if (prev && state.requests.length > prev) flashRefreshHint('检测到新的聊天请求');
      state.previousRequestCount = state.requests.length;
      renderRequests();
    }

    async function refreshContacts() {
      state.contacts = await get('/api/v1/chat/contacts');
      if (!Array.isArray(state.contacts)) state.contacts = [];
      renderContacts();
    }

    async function refreshConversations() {
      state.conversations = await get('/api/v1/chat/conversations');
      if (!Array.isArray(state.conversations)) state.conversations = [];
    }

    async function refreshGroups() {
      const prevStates = Object.assign({}, state.knownGroupStates || {});
      state.groups = await get('/api/v1/groups');
      if (!Array.isArray(state.groups)) state.groups = [];
      const nextStates = {};
      const freshInvites = [];
      state.groups.forEach(group => {
        nextStates[group.group_id] = group.local_member_state || '';
        const prevState = prevStates[group.group_id] || '';
        if (group.local_member_state === 'invited' && prevState !== 'invited') {
          freshInvites.push(group);
        }
      });
      state.knownGroupStates = nextStates;
      if (freshInvites.length > 0) {
        const latest = freshInvites[0];
        flashRefreshHint('收到新的群邀请');
        showMessage('info', '收到新的群邀请：' + (latest.title || '未命名群'));
      }
      renderGroupInvites();
    }

    async function refreshDirectMessages() {
      const conv = getSelectedConversation();
      if (!conv) {
        state.messages = [];
        state.peerStatus = null;
        return;
      }
      const key = threadKey('direct', conv.conversation_id);
      const prev = state.previousThreadCounts[key] || 0;
      state.messages = await get('/api/v1/chat/conversations/' + encodeURIComponent(conv.conversation_id) + '/messages');
      if (!Array.isArray(state.messages)) state.messages = [];
      state.peerStatus = await get('/api/v1/chat/peers/' + encodeURIComponent(conv.peer_id) + '/status').catch(() => null);
      if (prev && state.messages.length > prev) {
        const newest = state.messages[state.messages.length - 1];
        flashRefreshHint(newest && newest.direction === 'inbound' ? '检测到新的单聊消息' : '单聊消息已更新');
      }
      state.previousThreadCounts[key] = state.messages.length;
    }

    async function refreshGroupThread() {
      const group = getSelectedGroup();
      if (!group) {
        state.groupMessages = [];
        state.selectedGroupDetails = null;
        return;
      }
      const key = threadKey('group', group.group_id);
      const prev = state.previousThreadCounts[key] || 0;
      state.selectedGroupDetails = await get('/api/v1/groups/' + encodeURIComponent(group.group_id));
      state.groupMessages = await get('/api/v1/groups/' + encodeURIComponent(group.group_id) + '/messages');
      if (!Array.isArray(state.groupMessages)) state.groupMessages = [];
      if (prev && state.groupMessages.length > prev) {
        const newest = state.groupMessages[state.groupMessages.length - 1];
        flashRefreshHint(newest && newest.sender_peer_id !== state.me?.peer_id ? '检测到新的群消息' : '群消息已更新');
      }
      state.previousThreadCounts[key] = state.groupMessages.length;
    }

    async function refreshCurrentThread() {
      reconcileThreadSelection();
      if (state.selectedThreadKind === 'direct') {
        await refreshDirectMessages();
      } else if (state.selectedThreadKind === 'group') {
        await refreshGroupThread();
      } else {
        state.messages = [];
        state.groupMessages = [];
        state.selectedGroupDetails = null;
        state.peerStatus = null;
      }
      renderThread();
    }

    async function refreshAll() {
      await Promise.all([refreshProfile(), refreshNetwork(), refreshContacts(), refreshRequests(), refreshConversations(), refreshGroups()]);
      reconcileThreadSelection();
      renderThreadLists();
      await refreshCurrentThread();
      state.lastRefreshAt = new Date().toISOString();
      renderRefreshStatus();
      renderRequestSend();
      renderGroupCreate();
    }

    window.addEventListener('load', async () => {
      const lightbox = document.getElementById('image-lightbox');
      const lightboxClose = document.getElementById('lightbox-close');
      const mobileBackdrop = document.getElementById('mobile-sheet-backdrop');
      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) closeImageLightbox();
        });
      }
      if (mobileBackdrop) {
        mobileBackdrop.addEventListener('click', closeMobilePanel);
      }
      if (lightboxClose) lightboxClose.addEventListener('click', closeImageLightbox);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeImageLightbox();
      });
      window.addEventListener('resize', () => {
        applyMobilePanelState();
        renderMobileAppBar();
      });
      renderRequestSend();
      renderGroupCreate();
      applyMobilePanelState();
      renderMobileAppBar();
      try {
        await refreshAll();
      } catch (err) {
        showMessage('err', '初始化失败: ' + err.message);
      }
      setInterval(async () => {
        try {
          await refreshContacts();
          await refreshRequests();
          await refreshConversations();
          await refreshGroups();
          reconcileThreadSelection();
          renderThreadLists();
          await refreshCurrentThread();
          state.lastRefreshAt = new Date().toISOString();
          renderRefreshStatus();
        } catch (_) {}
      }, 5000);
    });
  </script>
</body>
</html>
