mode: relay

data_dir: data

identity_key_path: ""

p2p:
  listen_addrs:
    - "/ip4/0.0.0.0/tcp/4001"
    - "/ip6/::/tcp/4001"
    - /ip4/0.0.0.0/udp/4001/quic-v1
    - /ip6/::/udp/4001/quic-v1
  bootstrap_peers: []
  # nodisc: true               # 为 true 时禁用 DHT Advertise/FindPeers 节点发现，仅使用 bootstrap、已连接节点 gossip 和 peer exchange

socks5:
  listen: "0.0.0.0:1080"
  # tunnel_to_exit: true        # 客户端启用后，本地 1080 收到的 TCP 原样转发到 exit 的 SOCKS5
  # exit_upstream: "127.0.0.1:1081"   # exit 节点上的直连 SOCKS5，直接出网并受出口策略限制
  # allow_udp_associate: true   # 啟用 SOCKS5 UDP ASSOCIATE（需出口策略 allow_udp 配合）

api:
  listen: "0.0.0.0:19080"

# 嵌入式 IPFS（复用同一 libp2p host，见 ipfs.md）。需 DHT；从其他节点（如 Kubo）拉取内容时，请把对方 multiaddr 配到 p2p.bootstrap_peers 或确保公网 DHT 可发现。
ipfs:
  enabled: true
  data_dir: ipfs                    # 相对 data_dir，块与元数据目录为 data/ipfs/
  gateway_enabled: true             # GET /ipfs/...
  api_enabled: true                 # POST /api/ipfs/add、/api/ipfs/pin/、GET /api/ipfs/stat/...
  gateway_writable: false           # 原型固定只读，勿改
  datastore_type: leveldb
  # blockstore_no_sync: false
  chunker: size-262144
  raw_leaves: true
  cid_version: 1
  hash_function: sha2-256
  auto_provide: true
  reprovide_interval_seconds: 0     # 预留，当前实现未用
  routing_mode: dht-client          # 说明用，与进程内 DHT 一致
  fetch_timeout_seconds: 60         # 网关取回超时（秒）
  auto_pin_on_add: true
  max_upload_bytes: 67108864        # 单次上传上限，默认 64MiB

# 電路池：默認預建 1 條電路，按需擴展；空閒超時銷毀、失敗自動補建
circuit_pool:
  min_per_pool: 1
  max_per_pool: 3
  min_total: 3
  max_total: 5
  idle_timeout_seconds: 300
  replenish_interval_seconds: 30

# 自動重試與故障切換：建鏈失敗重試、relay/exit 失效換路、BEGIN_TCP 換出口重試
# 出口選擇：控制每條電路最後一跳 Exit 的篩選與排序 (auto | country_only | country_preferred | fixed_peer)
client:
  build_retries: 1      # 建鏈失敗重試次數 (0/1/2)
  begin_tcp_retries: 1  # exit 連線失敗換出口重試次數 (0/1/2)
  begin_connect_timeout_seconds: 30
  heartbeat_enabled: true
  heartbeat_interval_seconds: 30
  heartbeat_timeout_seconds: 8
  heartbeat_failure_threshold: 5
  skip_heartbeat_when_active_seconds: 30
  exit_selection:
    mode: auto                    # auto | country_only | country_preferred | fixed_peer
    allowed_countries: []         # country_only 時僅允許這些國家 (e.g. ["SG","JP"])
    preferred_countries: []       # country_preferred 時優先順序 (e.g. ["TH","SG","MY"])
    fixed_exit_peer_id: ""        # fixed_peer 時指定 peer_id
    exclude_countries: []         # 任意模式皆排除這些國家
    exclude_peer_ids: []
    require_remote_dns: false
    require_tcp_support: true
    fallback_to_any: true         # 找不到符合條件時是否退回任意出口
    allow_direct_exit: true       # 是否允許 Local -> Exit（否則強制經 relay）
  # 從出口節點 IP 解析國家（當 descriptor 無 exit_info.country 時）：用於 country_only / country_preferred 與 API 顯示
  geoip:
    provider: geolite2  # none | ip-api | geolite2（本地 mmdb，缺失時自動下載到 data_dir）
    cache_ttl_minutes: 1440   # 緩存 24 小時

# 出口節點策略（僅在 mode: relay+exit 時生效）：運營者控制允許代理的端口、域名、peer、私網/回環、維護模式等
